<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>🐍 贪吃蛇小游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  display: flex; justify-content: center; align-items: center;
  min-height: 100vh; font-family: 'Microsoft YaHei', sans-serif;
  overflow: hidden;
}
.container {
  text-align: center; position: relative;
}
h1 {
  color: #0ff; font-size: 2.2em; margin-bottom: 8px;
  text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
  letter-spacing: 4px;
}
.score-bar {
  display: flex; justify-content: center; gap: 40px;
  margin-bottom: 10px; color: #fff; font-size: 1.1em;
}
.score-bar span { color: #ff0; text-shadow: 0 0 10px #ff0; }
canvas {
  border: 3px solid #0ff; border-radius: 12px;
  box-shadow: 0 0 30px rgba(0,255,255,0.3), inset 0 0 30px rgba(0,255,255,0.05);
  background: #111;
}
.controls {
  margin-top: 14px; color: #aaa; font-size: 0.95em;
}
.controls kbd {
  background: #333; color: #0ff; padding: 3px 10px;
  border-radius: 5px; border: 1px solid #0ff; font-size: 0.9em;
  margin: 0 2px;
}
.overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,0,0,0.7); border-radius: 12px; z-index: 10;
}
.overlay h2 {
  color: #ff4444; font-size: 2.5em; text-shadow: 0 0 20px #ff4444;
  margin-bottom: 10px;
}
.overlay .final-score { color: #ff0; font-size: 1.4em; margin-bottom: 20px; }
.overlay button {
  background: linear-gradient(135deg, #0ff, #00bcd4);
  color: #000; border: none; padding: 12px 40px;
  font-size: 1.2em; border-radius: 30px; cursor: pointer;
  font-weight: bold; letter-spacing: 2px;
  transition: all 0.3s;
}
.overlay button:hover {
  transform: scale(1.1); box-shadow: 0 0 25px #0ff;
}
.start-overlay h2 { color: #0ff; text-shadow: 0 0 30px #0ff; }
.start-overlay .emoji { font-size: 4em; margin-bottom: 10px; }
.mobile-btns {
  display: none; margin-top: 12px;
  grid-template-areas: ". up ." "left . right" ". down .";
  grid-template-columns: repeat(3, 60px);
  grid-template-rows: repeat(3, 60px);
  gap: 5px; justify-content: center;
}
.mobile-btns button {
  width: 60px; height: 60px; border-radius: 12px;
  background: rgba(0,255,255,0.15); border: 2px solid #0ff;
  color: #0ff; font-size: 1.6em; cursor: pointer;
  transition: all 0.15s;
}
.mobile-btns button:active { background: rgba(0,255,255,0.4); transform: scale(0.92); }
#btnUp { grid-area: up; }
#btnDown { grid-area: down; }
#btnLeft { grid-area: left; }
#btnRight { grid-area: right; }
@media (pointer: coarse) {
  .mobile-btns { display: grid; }
}
</style>
</head>
<body>
<div class="container">
  <h1>🐍 贪吃蛇</h1>
  <div class="score-bar">
    得分: <span id="score">0</span> &nbsp;|&nbsp; 最高分: <span id="highScore">0</span>
  </div>
  <div style="position:relative; display:inline-block;">
    <canvas id="game" width="400" height="400"></canvas>
    <div class="overlay start-overlay" id="startScreen">
      <div class="emoji">🐍</div>
      <h2>贪吃蛇</h2>
      <p style="color:#aaa; margin:10px 0 20px;">经典街机游戏</p>
      <button onclick="startGame()">开始游戏</button>
    </div>
    <div class="overlay" id="gameOverScreen" style="display:none;">
      <h2>游戏结束</h2>
      <div class="final-score">得分: <span id="finalScore">0</span></div>
      <button onclick="startGame()">再来一局</button>
    </div>
  </div>
  <div class="controls">
    <kbd>↑</kbd><kbd>↓</kbd><kbd>←</kbd><kbd>→</kbd> 或
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 控制方向 &nbsp;|&nbsp;
    <kbd>P</kbd> 暂停
  </div>
  <div class="mobile-btns">
    <button id="btnUp" onclick="setDir(0,-1)">▲</button>
    <button id="btnLeft" onclick="setDir(-1,0)">◀</button>
    <button id="btnRight" onclick="setDir(1,0)">▶</button>
    <button id="btnDown" onclick="setDir(0,1)">▼</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GRID = 20, COLS = canvas.width / GRID, ROWS = canvas.height / GRID;

let snake, dir, nextDir, food, score, highScore = 0, speed, loop, paused, alive;

// 读取本地最高分
try { highScore = parseInt(localStorage.getItem('snakeHigh')) || 0; } catch(e) {}
document.getElementById('highScore').textContent = highScore;

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('gameOverScreen').style.display = 'none';
  snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
  dir = {x:1,y:0}; nextDir = {x:1,y:0};
  score = 0; speed = 200; paused = false; alive = true;
  document.getElementById('score').textContent = 0;
  spawnFood();
  if (loop) clearInterval(loop);
  loop = setInterval(tick, speed);
}

function spawnFood() {
  // 把食物限制在中间区域（约占总区域60%）
  const MARGIN = 4; // 距边缘留4格
  let pos;
  do {
    pos = {
      x: MARGIN + Math.floor(Math.random() * (COLS - MARGIN * 2)),
      y: MARGIN + Math.floor(Math.random() * (ROWS - MARGIN * 2))
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function tick() {
  if (paused || !alive) return;
  dir = nextDir;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  // 撞墙 or 撞自己
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
      snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver(); return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    spawnFood();
    // 加速 - 根据分数动态调整速度
    speed = Math.max(60, 200 - Math.floor(score / 10) * 5);
    clearInterval(loop);
    loop = setInterval(tick, speed);
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  // 背景
  ctx.fillStyle = '#111';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // 网格线
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= COLS; i++) {
    ctx.beginPath(); ctx.moveTo(i*GRID,0); ctx.lineTo(i*GRID,canvas.height); ctx.stroke();
  }
  for (let i = 0; i <= ROWS; i++) {
    ctx.beginPath(); ctx.moveTo(0,i*GRID); ctx.lineTo(canvas.width,i*GRID); ctx.stroke();
  }

  // 食物（带光晕）
  ctx.shadowColor = '#ff0055';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#ff0055';
  ctx.beginPath();
  ctx.arc(food.x*GRID+GRID/2, food.y*GRID+GRID/2, GRID/2-2, 0, Math.PI*2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // 蛇身
  snake.forEach((s, i) => {
    const ratio = 1 - i / snake.length;
    const g = Math.floor(180 + 75 * ratio);
    const b = Math.floor(50 * ratio);
    ctx.fillStyle = i === 0 ? '#0ff' : `rgb(0,${g},${b})`;
    if (i === 0) { ctx.shadowColor = '#0ff'; ctx.shadowBlur = 10; }
    const pad = i === 0 ? 1 : 2;
    ctx.beginPath();
    ctx.roundRect(s.x*GRID+pad, s.y*GRID+pad, GRID-pad*2, GRID-pad*2, 4);
    ctx.fill();
    ctx.shadowBlur = 0;
  });

  // 蛇眼
  const h = snake[0];
  ctx.fillStyle = '#000';
  const ex = dir.x === 0 ? 5 : (dir.x > 0 ? 8 : 2);
  const ey = dir.y === 0 ? 5 : (dir.y > 0 ? 8 : 2);
  ctx.beginPath(); ctx.arc(h.x*GRID+ex, h.y*GRID+ey, 2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(h.x*GRID+ex+6, h.y*GRID+ey, 2, 0, Math.PI*2); ctx.fill();

  // 暂停提示
  if (paused) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 36px Microsoft YaHei';
    ctx.textAlign = 'center';
    ctx.fillText('⏸ 暂停', canvas.width/2, canvas.height/2+12);
  }
}

function gameOver() {
  alive = false;
  clearInterval(loop);
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem('snakeHigh', highScore); } catch(e) {}
    document.getElementById('highScore').textContent = highScore;
  }
  document.getElementById('finalScore').textContent = score;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

function setDir(x, y) {
  if (!alive || paused) return;
  if (dir.x + x === 0 && dir.y + y === 0) return; // 不能掉头
  nextDir = {x, y};
}

// 键盘控制
document.addEventListener('keydown', e => {
  if (e.key === 'p' || e.key === 'P') { paused = !paused; draw(); return; }
  const map = {
    ArrowUp:[0,-1], ArrowDown:[0,1], ArrowLeft:[-1,0], ArrowRight:[1,0],
    w:[0,-1], s:[0,1], a:[-1,0], d:[1,0],
    W:[0,-1], S:[0,1], A:[-1,0], D:[1,0]
  };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
});

// 初始绘制
ctx.fillStyle = '#111'; ctx.fillRect(0,0,canvas.width,canvas.height);
</script>
</body>
</html>
