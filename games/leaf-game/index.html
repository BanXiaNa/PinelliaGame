<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍂 捡树叶游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: linear-gradient(180deg, #87CEEB 0%, #98FB98 70%, #228B22 100%);
            font-family: 'Microsoft YaHei', sans-serif;
            user-select: none;
        }

        #gameCanvas {
            display: block;
            cursor: none;
        }

        #customCursor {
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            font-size: 40px;
            transform: translate(-50%, -50%);
            transition: transform 0.1s;
            filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.3));
        }

        #customCursor.grabbing {
            transform: translate(-50%, -50%) scale(1.2);
        }

        #ui {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 100;
            background: rgba(255,255,255,0.9);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            min-width: 200px;
        }

        #ui h2 {
            color: #2E7D32;
            margin-bottom: 10px;
            font-size: 18px;
        }

        .stat {
            margin: 8px 0;
            font-size: 16px;
            color: #333;
        }

        .stat span {
            font-weight: bold;
            color: #FF6B35;
        }

        #shop {
            position: fixed;
            top: 10px;
            right: 10px;
            z-index: 100;
            background: rgba(255,255,255,0.95);
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            max-height: 90vh;
            overflow-y: auto;
        }

        #shop h3 {
            color: #2E7D32;
            margin-bottom: 10px;
            text-align: center;
        }

        .shop-item {
            background: #f5f5f5;
            padding: 12px;
            margin: 8px 0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .shop-item:hover:not(.owned):not(.locked) {
            border-color: #4CAF50;
            transform: scale(1.02);
        }

        .shop-item.owned {
            background: #E8F5E9;
            border-color: #4CAF50;
        }

        .shop-item.locked {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .shop-item .item-name {
            font-weight: bold;
            color: #333;
            font-size: 14px;
        }

        .shop-item .item-desc {
            font-size: 12px;
            color: #666;
            margin: 4px 0;
        }

        .shop-item .item-price {
            font-size: 14px;
            color: #FF6B35;
            font-weight: bold;
        }

        .shop-item .item-owned {
            color: #4CAF50;
            font-weight: bold;
        }

        #combo {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            color: #FF6B35;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
            pointer-events: none;
        }

        #combo.show {
            opacity: 1;
            animation: comboAnim 0.5s ease-out;
        }

        @keyframes comboAnim {
            0% { transform: translate(-50%, -50%) scale(0.5); }
            50% { transform: translate(-50%, -50%) scale(1.3); }
            100% { transform: translate(-50%, -50%) scale(1); }
        }

        .float-text {
            position: fixed;
            pointer-events: none;
            font-size: 20px;
            font-weight: bold;
            color: #FFD700;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
            animation: floatUp 1s ease-out forwards;
            z-index: 150;
        }

        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
        }

        #message {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 100;
            transition: opacity 0.3s;
        }

        .weather-indicator {
            position: fixed;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 100;
        }

        #startScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #startScreen .content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
        }

        #startScreen h1 {
            color: #2E7D32;
            font-size: 36px;
            margin-bottom: 20px;
        }

        #startScreen p {
            color: #666;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        #startBtn {
            background: linear-gradient(135deg, #4CAF50, #2E7D32);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 20px;
            border-radius: 30px;
            cursor: pointer;
            transition: transform 0.2s;
        }

        #startBtn:hover {
            transform: scale(1.05);
        }

        .season-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
            margin-left: 5px;
        }

        .spring { background: #FFB7C5; color: #8B0000; }
        .summer { background: #98FB98; color: #006400; }
        .autumn { background: #FFD700; color: #8B4513; }
        .winter { background: #ADD8E6; color: #00008B; }
    </style>
</head>
<body>
<!-- 返回游戏大厅 -->
<style>.gm-back{position:fixed;top:12px;left:12px;z-index:99999;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fff!important;border-radius:8px;text-decoration:none!important;font-size:13px;font-family:sans-serif;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);opacity:0.4;transition:opacity 0.3s}.gm-back:hover{opacity:1}</style>
<a href="../../GameMain/index.html" class="gm-back">← 返回游戏大厅</a>
    <div id="startScreen">
        <div class="content">
            <h1>🍂 捡树叶游戏</h1>
            <p>欢迎来到捡树叶的世界！<br><br>
            🖐️ 开局你只能用手捡树叶<br>
            💰 捡树叶赚取金币<br>
            🛒 购买更好的工具提升效率<br>
            🍃 不同季节会出现不同的树叶<br>
            ⚡ 连击可以获得额外奖励！</p>
            <button id="startBtn">开始游戏</button>
        </div>
    </div>

    <div id="customCursor">🖐️</div>

    <div id="ui">
        <h2>🍂 捡树叶</h2>
        <div class="stat">💰 金币: <span id="coins">0</span></div>
        <div class="stat">🍃 数量: <span id="leafCount">0</span></div>
        <div class="stat">⚡ 连击: <span id="comboCount">0</span></div>
        <div class="stat">🔧 工具: <span id="currentTool">手</span></div>
        <div class="stat">🌤️ 季节: <span id="season">春</span></div>
    </div>

    <div id="shop">
        <h3>🛒 工具商店</h3>
        <div id="shopItems"></div>
    </div>

    <div id="combo"></div>
    <div id="message"></div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const cursor = document.getElementById('customCursor');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game state
        let gameState = {
            coins: 0,
            leafCount: 0,
            combo: 0,
            comboTimer: null,
            currentTool: 'hand',
            tools: {
                hand: { name: '手', emoji: '🖐️', speed: 1, value: 1, price: 0, owned: true },
                glove: { name: '手套', emoji: '🧤', speed: 1.3, value: 1.5, price: 50, owned: false, desc: '捡取速度+30%, 价值+50%' },
                net: { name: '网兜', emoji: '🥅', speed: 1.8, value: 2, price: 200, owned: false, desc: '捡取速度+80%, 价值翻倍' },
                rake: { name: '耙子', emoji: '🧹', speed: 2.5, value: 3, price: 500, owned: false, desc: '捡取速度+150%, 价值x3' },
                magnet: { name: '磁铁', emoji: '🧲', speed: 4, value: 5, price: 1500, owned: false, desc: '自动吸引附近树叶, 价值x5' },
                robot: { name: '机器人', emoji: '🤖', speed: 8, value: 10, price: 5000, owned: false, desc: '全自动捡树叶, 价值x10' }
            },
            season: 0, // 0=spring, 1=summer, 2=autumn, 3=winter
            seasonTimer: 0,
            weather: 'sunny',
            particles: [],
            trees: []
        };

        // Leaf types by season
        const leafTypes = {
            spring: [
                { emoji: '🌸', name: '樱花', value: 2, rarity: 0.3 },
                { emoji: '🍃', name: '新叶', value: 1, rarity: 0.5 },
                { emoji: '🌿', name: '嫩芽', value: 3, rarity: 0.2 }
            ],
            summer: [
                { emoji: '🍃', name: '绿叶', value: 1, rarity: 0.5 },
                { emoji: '🌿', name: '草叶', value: 1, rarity: 0.3 },
                { emoji: '🍀', name: '四叶草', value: 10, rarity: 0.05 },
                { emoji: '🌴', name: '棕榈叶', value: 5, rarity: 0.15 }
            ],
            autumn: [
                { emoji: '🍂', name: '落叶', value: 2, rarity: 0.4 },
                { emoji: '🍁', name: '枫叶', value: 3, rarity: 0.3 },
                { emoji: '🌰', name: '栗子', value: 5, rarity: 0.2 },
                { emoji: '🍄', name: '蘑菇', value: 8, rarity: 0.1 }
            ],
            winter: [
                { emoji: '❄️', name: '雪花', value: 3, rarity: 0.4 },
                { emoji: '🎄', name: '松针', value: 2, rarity: 0.3 },
                { emoji: '⭐', name: '星星', value: 15, rarity: 0.05 },
                { emoji: '🌨️', name: '冰晶', value: 5, rarity: 0.25 }
            ]
        };

        const seasonNames = ['春', '夏', '秋', '冬'];
        const seasonClasses = ['spring', 'summer', 'autumn', 'winter'];

        // Leaves on screen
        let leaves = [];
        let mouseX = canvas.width / 2;
        let mouseY = canvas.height / 2;
        let isGrabbing = false;
        let gameStarted = false;

        // Tree positions
        function initTrees() {
            gameState.trees = [];
            for (let i = 0; i < 5; i++) {
                gameState.trees.push({
                    x: Math.random() * canvas.width,
                    y: canvas.height * 0.3 + Math.random() * canvas.height * 0.3,
                    size: 80 + Math.random() * 60,
                    type: Math.floor(Math.random() * 3)
                });
            }
        }

        // Create a new leaf
        function createLeaf() {
            const seasons = ['spring', 'summer', 'autumn', 'winter'];
            const seasonLeaves = leafTypes[seasons[gameState.season]];
            const rand = Math.random();
            let cumulative = 0;
            let selectedLeaf = seasonLeaves[0];

            for (const leaf of seasonLeaves) {
                cumulative += leaf.rarity;
                if (rand <= cumulative) {
                    selectedLeaf = leaf;
                    break;
                }
            }

            const tree = gameState.trees[Math.floor(Math.random() * gameState.trees.length)];

            return {
                x: tree.x + (Math.random() - 0.5) * tree.size,
                y: tree.y - tree.size/2 + Math.random() * tree.size * 0.3,
                vx: (Math.random() - 0.5) * 2,
                vy: Math.random() * 1 + 0.5,
                rotation: Math.random() * Math.PI * 2,
                rotationSpeed: (Math.random() - 0.5) * 0.1,
                size: 30 + Math.random() * 15,
                emoji: selectedLeaf.emoji,
                name: selectedLeaf.name,
                value: selectedLeaf.value,
                alpha: 1,
                collected: false,
                wobble: Math.random() * Math.PI * 2,
                wobbleSpeed: 0.02 + Math.random() * 0.03
            };
        }

        // Draw tree
        function drawTree(tree) {
            // Trunk
            ctx.fillStyle = '#8B4513';
            ctx.fillRect(tree.x - 15, tree.y, 30, canvas.height - tree.y);

            // Leaves/branches
            const colors = {
                0: ['#228B22', '#32CD32', '#90EE90'], // Green
                1: ['#006400', '#228B22', '#32CD32'], // Dark green
                2: ['#8B4513', '#A0522D', '#CD853F']  // Brown (autumn)
            };

            if (gameState.season === 2) { // Autumn
                colors[0] = ['#FF6347', '#FFD700', '#FF8C00'];
                colors[1] = ['#FF4500', '#FF6347', '#FFA500'];
                colors[2] = ['#8B4513', '#A0522D', '#CD853F'];
            } else if (gameState.season === 3) { // Winter
                colors[0] = ['#F0F8FF', '#E6E6FA', '#D3D3D3'];
                colors[1] = ['#DCDCDC', '#D3D3D3', '#C0C0C0'];
                colors[2] = ['#8B4513', '#A0522D', '#696969'];
            }

            const treeColors = colors[tree.type];

            for (let i = 0; i < 5; i++) {
                ctx.beginPath();
                ctx.arc(
                    tree.x + (Math.random() - 0.5) * 40,
                    tree.y - tree.size/2 + (Math.random() - 0.5) * 40,
                    tree.size/2 + Math.random() * 20,
                    0,
                    Math.PI * 2
                );
                ctx.fillStyle = treeColors[i % treeColors.length];
                ctx.globalAlpha = 0.7;
                ctx.fill();
            }
            ctx.globalAlpha = 1;
        }

        // Draw ground
        function drawGround() {
            const gradient = ctx.createLinearGradient(0, canvas.height * 0.7, 0, canvas.height);
            gradient.addColorStop(0, '#228B22');
            gradient.addColorStop(1, '#006400');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, canvas.height * 0.7, canvas.width, canvas.height * 0.3);

            // Grass details
            ctx.strokeStyle = '#32CD32';
            ctx.lineWidth = 2;
            for (let i = 0; i < canvas.width; i += 20) {
                ctx.beginPath();
                ctx.moveTo(i, canvas.height * 0.7);
                ctx.lineTo(i + 5, canvas.height * 0.7 - 15 - Math.random() * 10);
                ctx.stroke();
            }
        }

        // Draw clouds
        function drawClouds() {
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            const time = Date.now() / 10000;
            for (let i = 0; i < 5; i++) {
                const x = ((time * 50 + i * 200) % (canvas.width + 200)) - 100;
                const y = 50 + i * 30;
                drawCloud(x, y, 40 + i * 10);
            }
        }

        function drawCloud(x, y, size) {
            ctx.beginPath();
            ctx.arc(x, y, size, 0, Math.PI * 2);
            ctx.arc(x + size * 0.8, y - size * 0.3, size * 0.7, 0, Math.PI * 2);
            ctx.arc(x + size * 1.5, y, size * 0.8, 0, Math.PI * 2);
            ctx.fill();
        }

        // Particles
        function createParticle(x, y, emoji) {
            for (let i = 0; i < 5; i++) {
                gameState.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 - 3,
                    life: 1,
                    emoji: emoji || '✨',
                    size: 15 + Math.random() * 10
                });
            }
        }

        function updateParticles() {
            for (let i = gameState.particles.length - 1; i >= 0; i--) {
                const p = gameState.particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.02;
                if (p.life <= 0) {
                    gameState.particles.splice(i, 1);
                }
            }
        }

        function drawParticles() {
            gameState.particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = `${p.size}px Arial`;
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;
        }

        // Float text effect
        function showFloatText(x, y, text, color = '#FFD700') {
            const el = document.createElement('div');
            el.className = 'float-text';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.style.color = color;
            el.textContent = text;
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }

        // Show combo
        function showCombo(count) {
            const comboEl = document.getElementById('combo');
            comboEl.textContent = `⚡ ${count} 连击!`;
            comboEl.className = 'show';
            setTimeout(() => comboEl.className = '', 500);
        }

        // Show message
        function showMessage(text, duration = 2000) {
            const msgEl = document.getElementById('message');
            msgEl.textContent = text;
            msgEl.style.opacity = 1;
            setTimeout(() => msgEl.style.opacity = 0, duration);
        }

        // Update shop UI
        function updateShop() {
            const shopDiv = document.getElementById('shopItems');
            shopDiv.innerHTML = '';

            Object.entries(gameState.tools).forEach(([key, tool]) => {
                const div = document.createElement('div');
                div.className = `shop-item ${tool.owned ? 'owned' : ''} ${!tool.owned && gameState.coins < tool.price ? 'locked' : ''}`;

                if (tool.owned) {
                    div.innerHTML = `
                        <div class="item-name">${tool.emoji} ${tool.name}</div>
                        <div class="item-desc">${tool.desc || '初始工具'}</div>
                        <div class="item-owned">✓ 已拥有</div>
                    `;
                    div.onclick = () => equipTool(key);
                } else {
                    div.innerHTML = `
                        <div class="item-name">${tool.emoji} ${tool.name}</div>
                        <div class="item-desc">${tool.desc}</div>
                        <div class="item-price">💰 ${tool.price}</div>
                    `;
                    div.onclick = () => buyTool(key);
                }

                shopDiv.appendChild(div);
            });
        }

        // Buy tool
        function buyTool(toolKey) {
            const tool = gameState.tools[toolKey];
            if (tool.owned) {
                showMessage('你已经拥有这个工具了！');
                return;
            }
            if (gameState.coins < tool.price) {
                showMessage(`金币不足！还需要 ${tool.price - gameState.coins} 金币`);
                return;
            }

            gameState.coins -= tool.price;
            tool.owned = true;
            equipTool(toolKey);
            showMessage(`🎉 购买成功：${tool.name}！`);
            updateUI();
            updateShop();
        }

        // Equip tool
        function equipTool(toolKey) {
            gameState.currentTool = toolKey;
            const tool = gameState.tools[toolKey];
            cursor.textContent = tool.emoji;
            document.getElementById('currentTool').textContent = tool.name;
            showMessage(`已装备：${tool.name}`);
        }

        // Update UI
        function updateUI() {
            document.getElementById('coins').textContent = gameState.coins;
            document.getElementById('leafCount').textContent = gameState.leafCount;
            document.getElementById('comboCount').textContent = gameState.combo;
            document.getElementById('season').textContent = seasonNames[gameState.season];
        }

        // Check if leaf is near cursor (for magnet/robot)
        function isLeafNear(leaf, range) {
            const dx = leaf.x - mouseX;
            const dy = leaf.y - mouseY;
            return Math.sqrt(dx * dx + dy * dy) < range;
        }

        // Auto collect with robot
        function autoCollect() {
            if (gameState.currentTool === 'robot' || gameState.currentTool === 'magnet') {
                const range = gameState.currentTool === 'robot' ? 200 : 100;
                leaves.forEach(leaf => {
                    if (!leaf.collected && isLeafNear(leaf, range)) {
                        const dx = mouseX - leaf.x;
                        const dy = mouseY - leaf.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        leaf.x += (dx / dist) * 5;
                        leaf.y += (dy / dist) * 5;

                        if (dist < 30) {
                            collectLeaf(leaf);
                        }
                    }
                });
            }
        }

        // Collect a leaf
        function collectLeaf(leaf) {
            if (leaf.collected) return;
            leaf.collected = true;

            const tool = gameState.tools[gameState.currentTool];
            const value = Math.floor(leaf.value * tool.value);

            // Combo system
            gameState.combo++;
            clearTimeout(gameState.comboTimer);
            gameState.comboTimer = setTimeout(() => gameState.combo = 0, 2000);

            const comboBonus = Math.floor(gameState.combo / 5);
            const totalValue = value + comboBonus;

            gameState.coins += totalValue;
            gameState.leafCount++;

            createParticle(leaf.x, leaf.y, leaf.emoji);
            showFloatText(leaf.x, leaf.y - 20, `+${totalValue} 💰`);

            if (gameState.combo > 0 && gameState.combo % 5 === 0) {
                showCombo(gameState.combo);
            }

            updateUI();
            updateShop();
        }

        // Main game loop
        function gameLoop() {
            if (!gameStarted) {
                requestAnimationFrame(gameLoop);
                return;
            }

            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Update season
            gameState.seasonTimer++;
            if (gameState.seasonTimer >= 1800) { // Change season every 30 seconds
                gameState.seasonTimer = 0;
                gameState.season = (gameState.season + 1) % 4;
                showMessage(`🌿 季节变化：${seasonNames[gameState.season]}来了！`);
                initTrees();
                updateUI();
            }

            // Spawn leaves
            if (Math.random() < 0.05 * gameState.tools[gameState.currentTool].speed) {
                leaves.push(createLeaf());
            }

            // Draw background
            drawGround();
            drawClouds();

            // Draw trees
            gameState.trees.forEach(drawTree);

            // Update and draw leaves
            for (let i = leaves.length - 1; i >= 0; i--) {
                const leaf = leaves[i];

                if (leaf.collected) {
                    leaf.alpha -= 0.1;
                    if (leaf.alpha <= 0) {
                        leaves.splice(i, 1);
                        continue;
                    }
                }

                // Update leaf position
                leaf.wobble += leaf.wobbleSpeed;
                leaf.x += leaf.vx + Math.sin(leaf.wobble) * 0.5;
                leaf.y += leaf.vy;
                leaf.rotation += leaf.rotationSpeed;

                // Remove if off screen
                if (leaf.y > canvas.height + 50 || leaf.x < -50 || leaf.x > canvas.width + 50) {
                    leaves.splice(i, 1);
                    continue;
                }

                // Draw leaf
                ctx.save();
                ctx.globalAlpha = leaf.alpha;
                ctx.translate(leaf.x, leaf.y);
                ctx.rotate(leaf.rotation);
                ctx.font = `${leaf.size}px Arial`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(leaf.emoji, 0, 0);
                ctx.restore();
            }

            // Auto collect for advanced tools
            autoCollect();

            // Update and draw particles
            updateParticles();
            drawParticles();

            requestAnimationFrame(gameLoop);
        }

        // Mouse events
        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        canvas.addEventListener('mousedown', (e) => {
            isGrabbing = true;
            cursor.classList.add('grabbing');

            // Check for leaf collection
            const tool = gameState.tools[gameState.currentTool];
            const collectRange = 30 + (tool.speed - 1) * 15;

            leaves.forEach(leaf => {
                if (!leaf.collected) {
                    const dx = leaf.x - e.clientX;
                    const dy = leaf.y - e.clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < collectRange) {
                        collectLeaf(leaf);
                    }
                }
            });
        });

        canvas.addEventListener('mouseup', () => {
            isGrabbing = false;
            cursor.classList.remove('grabbing');
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            cursor.style.left = touch.clientX + 'px';
            cursor.style.top = touch.clientY + 'px';

            const tool = gameState.tools[gameState.currentTool];
            const collectRange = 30 + (tool.speed - 1) * 15;

            leaves.forEach(leaf => {
                if (!leaf.collected) {
                    const dx = leaf.x - touch.clientX;
                    const dy = leaf.y - touch.clientY;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < collectRange) {
                        collectLeaf(leaf);
                    }
                }
            });
        });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touch = e.touches[0];
            mouseX = touch.clientX;
            mouseY = touch.clientY;
            cursor.style.left = touch.clientX + 'px';
            cursor.style.top = touch.clientY + 'px';
        });

        // Window resize
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initTrees();
        });

        // Start button
        document.getElementById('startBtn').addEventListener('click', () => {
            document.getElementById('startScreen').style.display = 'none';
            gameStarted = true;
            initTrees();
            updateShop();
            showMessage('🍂 开始捡树叶吧！点击树叶收集它们！');
        });

        // Start game loop
        gameLoop();
    </script>
</body>
</html>
