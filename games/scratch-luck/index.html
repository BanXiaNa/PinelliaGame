<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎰 刮刮乐 - 升级运气</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            font-family: 'Microsoft YaHei', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            display: flex;
            gap: 25px;
            padding: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .panel {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }

        .panel h2 {
            text-align: center;
            margin-bottom: 15px;
            color: #ffd700;
            font-size: 20px;
        }

        .stats { width: 280px; }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 15px;
        }

        .stat-val { color: #ffd700; font-weight: bold; font-size: 18px; }

        .luck-bar {
            width: 100%;
            height: 16px;
            background: rgba(0,0,0,0.3);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 8px;
        }

        .luck-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
            transition: width 0.5s;
            border-radius: 8px;
        }

        .card-area { display: flex; flex-direction: column; align-items: center; gap: 15px; }

        .card {
            position: relative;
            width: 350px;
            height: 240px;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            background: linear-gradient(135deg, #2d1b69, #11998e);
        }

        .card-bg {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 10px;
            z-index: 1;
        }

        .prize-area {
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 15px 25px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            border: 2px solid rgba(255,215,0,0.3);
        }

        .prize-icons {
            font-size: 52px;
            letter-spacing: 10px;
            filter: drop-shadow(0 0 10px rgba(255,215,0,0.5));
        }

        .prize-amount {
            font-size: 36px;
            font-weight: bold;
            color: #ffd700;
            text-shadow: 0 0 20px rgba(255,215,0,0.8);
        }

        .prize-text {
            font-size: 18px;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .scratch-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            cursor: crosshair;
        }

        .card-label {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 22px;
            font-weight: bold;
            color: #ffd700;
            pointer-events: none;
            z-index: 3;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }

        .scratch-hint {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: rgba(255,255,255,0.8);
            pointer-events: none;
            z-index: 3;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.8; }
            50% { opacity: 0.4; }
        }

        .scratch-particle {
            position: absolute;
            pointer-events: none;
            border-radius: 50%;
            z-index: 10;
            animation: particleFly 0.8s ease-out forwards;
        }

        @keyframes particleFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0.2); }
        }

        .spark {
            position: absolute;
            pointer-events: none;
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #fff;
            box-shadow: 0 0 6px #ffd700, 0 0 12px #ff6b35;
            z-index: 10;
            animation: sparkFly 0.6s ease-out forwards;
        }

        @keyframes sparkFly {
            0% { opacity: 1; transform: translate(0, 0) scale(1); }
            50% { opacity: 1; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
        }

        .reveal-flash {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.9) 50%, transparent 100%);
            animation: flashSweep 0.8s ease-out;
            pointer-events: none;
            z-index: 15;
        }

        @keyframes flashSweep {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .card-win-shake {
            animation: winShake 0.6s ease-in-out;
        }

        @keyframes winShake {
            0%, 100% { transform: rotate(0deg) scale(1); }
            15% { transform: rotate(-5deg) scale(1.05); }
            30% { transform: rotate(5deg) scale(1.05); }
            45% { transform: rotate(-4deg) scale(1.03); }
            60% { transform: rotate(4deg) scale(1.03); }
            75% { transform: rotate(-2deg) scale(1.01); }
            90% { transform: rotate(2deg) scale(1.01); }
        }

        .win-glow {
            position: absolute;
            top: -5px;
            left: -5px;
            right: -5px;
            bottom: -5px;
            border-radius: 22px;
            background: conic-gradient(#ffd700, #ff6b35, #ffd700, #ff6b35, #ffd700);
            animation: glowRotate 2s linear infinite;
            z-index: 0;
        }

        @keyframes glowRotate {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .prize-bounce .prize-icons {
            animation: symbolBounce 0.8s ease-out;
        }

        @keyframes symbolBounce {
            0% { transform: scale(0) rotate(-180deg); opacity: 0; }
            50% { transform: scale(1.3) rotate(10deg); }
            70% { transform: scale(0.9) rotate(-5deg); }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }

        .amount-roll {
            animation: rollIn 0.8s ease-out;
        }

        @keyframes rollIn {
            0% { transform: translateY(-40px) scale(0.3); opacity: 0; }
            60% { transform: translateY(8px) scale(1.15); }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }

        .scratch-progress {
            position: absolute;
            bottom: -10px;
            left: 10%;
            width: 80%;
            height: 6px;
            background: rgba(0,0,0,0.4);
            border-radius: 3px;
            z-index: 20;
            overflow: hidden;
        }

        .scratch-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcb77);
            border-radius: 3px;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(255,215,0,0.6);
        }

        .progress-text {
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 12px;
            color: #aaa;
            z-index: 20;
            white-space: nowrap;
        }

        .card-enter {
            animation: cardEnter 0.6s ease-out;
        }

        @keyframes cardEnter {
            0% { transform: scale(0.3) rotateY(180deg); opacity: 0; }
            60% { transform: scale(1.08) rotateY(-10deg); }
            100% { transform: scale(1) rotateY(0deg); opacity: 1; }
        }

        .card-lose-shake {
            animation: loseShake 0.5s ease-in-out;
        }

        @keyframes loseShake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-5px); }
            80% { transform: translateX(5px); }
        }

        .btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 14px 35px;
            font-size: 17px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 20px rgba(102,126,234,0.4);
        }

        .btn:hover:not(:disabled) { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(102,126,234,0.6); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .price-tag { font-size: 13px; color: #aaa; }

        .upgrades { width: 300px; }

        .upgrade-item {
            background: rgba(0,0,0,0.2);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 12px;
            border: 2px solid transparent;
            transition: all 0.3s;
        }

        .upgrade-item:hover:not(.maxed) { border-color: #ffd700; transform: translateX(5px); }

        .upgrade-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .upgrade-name { font-weight: bold; font-size: 15px; }
        .upgrade-lv { color: #ffd700; font-size: 13px; }
        .upgrade-desc { font-size: 12px; color: #aaa; margin-bottom: 8px; }

        .upgrade-btn {
            width: 100%;
            padding: 8px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upgrade-btn:not(:disabled) { background: linear-gradient(135deg, #ffd700, #ffaa00); color: #333; }
        .upgrade-btn:disabled { background: #555; color: #888; cursor: not-allowed; }
        .upgrade-btn.maxed { background: #4CAF50; color: white; cursor: default; }

        .prize-table { margin-top: 15px; }

        .prize-row {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 14px;
        }

        .prize-sym { font-size: 20px; }
        .prize-val { color: #ffd700; font-weight: bold; }

        .popup {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            background: rgba(0,0,0,0.95);
            padding: 30px 50px;
            border-radius: 20px;
            text-align: center;
            z-index: 1001;
            transition: transform 0.3s;
            border: 2px solid #ffd700;
        }

        .popup.show { transform: translate(-50%, -50%) scale(1); }
        .popup .amount { font-size: 44px; color: #ffd700; font-weight: bold; margin: 12px 0; }

        .coin-anim { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1000; }
        .coin {
            position: absolute;
            font-size: 28px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            0% { transform: translateY(-80px) rotate(0); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }

        .history { width: 280px; max-height: 250px; overflow-y: auto; }
        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .h-win { color: #6bcb77; }
        .h-lose { color: #ff6b6b; }
    </style>
</head>
<body>

    <div class="container">
        <div class="panel stats">
            <h2>💰 我的资产</h2>
            <div class="stat-row"><span>金币</span><span class="stat-val" id="coins">100</span></div>
            <div class="stat-row"><span>刮奖次数</span><span class="stat-val" id="scratches">0</span></div>
            <div class="stat-row"><span>中奖次数</span><span class="stat-val" id="wins">0</span></div>
            <div class="stat-row"><span>中奖率</span><span class="stat-val" id="winRate">0%</span></div>
            <div class="stat-row"><span>运气等级</span><span class="stat-val" id="luckLv">1</span></div>
            <div class="luck-bar"><div class="luck-fill" id="luckFill"></div></div>

        </div>

        <div class="card-area">
            <div class="card" id="card">
                <div class="card-bg">
                    <div class="prize-area">
                        <div class="prize-icons" id="pIcons">🍒🍒🍒</div>
                        <div class="prize-amount" id="pAmount">+100</div>
                        <div class="prize-text" id="pText">樱桃</div>
                    </div>
                </div>
                <canvas class="scratch-canvas" id="scratchCanvas" width="350" height="240"></canvas>
                <div class="card-label">🎰 刮刮乐</div>
                <div class="scratch-hint" id="scratchHint">用手指刮开涂层</div>
                <div class="scratch-progress">
                    <div class="scratch-progress-fill" id="progressFill"></div>
                </div>
                <div class="progress-text" id="progressText">已刮 0% / 需要 80%</div>
            </div>
            <button class="btn" id="newBtn" onclick="buyCard()">🎴 新刮刮乐</button>
            <div class="price-tag">价格: <span id="price">20</span> 金币</div>
        </div>

        <div class="panel upgrades">
            <h2>⬆️ 运气升级</h2>
            <div id="upgradeList"></div>
            <h2 style="margin-top:20px">🎯 奖品表</h2>
            <div class="prize-table">
                <div class="prize-row"><span class="prize-sym">🍒🍒🍒</span><span>樱桃</span><span class="prize-val">x10</span></div>
                <div class="prize-row"><span class="prize-sym">🍋🍋🍋</span><span>柠檬</span><span class="prize-val">x20</span></div>
                <div class="prize-row"><span class="prize-sym">🍊🍊🍊</span><span>橙子</span><span class="prize-val">x50</span></div>
                <div class="prize-row"><span class="prize-sym">🍇🍇🍇</span><span>葡萄</span><span class="prize-val">x100</span></div>
                <div class="prize-row"><span class="prize-sym">7️⃣7️⃣7️⃣</span><span>大奖</span><span class="prize-val">x500</span></div>
                <div class="prize-row"><span class="prize-sym">💎💎💎</span><span>钻石</span><span class="prize-val">x1000</span></div>
                <div class="prize-row"><span class="prize-sym">⭐⭐⭐</span><span>星星</span><span class="prize-val">x2000</span></div>
            </div>
        </div>
    </div>

    <div class="coin-anim" id="coinAnim"></div>
    <div class="popup" id="popup">
        <div id="popText"></div>
        <div class="amount" id="popAmount"></div>
    </div>

    <script>
        const canvas = document.getElementById('scratchCanvas');
        const ctx = canvas.getContext('2d');
        const card = document.getElementById('card');

        let G = {
            coins: 100,
            luck: 1,
            exp: 0,
            expNeed: 100,
            scratches: 0,
            wins: 0,
            basePrice: 20,
            history: [],
            upgrades: {
                luck:      { name: '🍀 基础运气', lv: 0, max: 20, cost: 50,  eff: 0.05, desc: '提高中奖率' },
                jackpot:   { name: '💎 大奖运',   lv: 0, max: 10, cost: 200, eff: 0.02, desc: '大奖概率↑' },
                discount:  { name: '🎫 折扣卡',   lv: 0, max: 10, cost: 100, eff: 0.05, desc: '降低卡价' },
                multi:     { name: '✨ 奖金倍率',  lv: 0, max: 15, cost: 300, eff: 0.10, desc: '奖金倍数↑' },
                expBoost:  { name: '📚 经验加成',  lv: 0, max: 10, cost: 150, eff: 0.10, desc: '经验获取↑' }
            }
        };

        const prizes = [
            { sym: ['🍒','🍒','🍒'], name: '樱桃', mul: 10,   w: 30 },
            { sym: ['🍋','🍋','🍋'], name: '柠檬', mul: 20,   w: 20 },
            { sym: ['🍊','🍊','🍊'], name: '橙子', mul: 50,   w: 12 },
            { sym: ['🍇','🍇','🍇'], name: '葡萄', mul: 100,  w: 6 },
            { sym: ['7️⃣','7️⃣','7️⃣'], name: '大奖', mul: 500,  w: 2 },
            { sym: ['💎','💎','💎'], name: '钻石', mul: 1000, w: 0.8 },
            { sym: ['⭐','⭐','⭐'], name: '星星', mul: 2000, w: 0.3 }
        ];

        const missCombos = [
            ['🍒','🍋','🍊'], ['🍒','🍇','🍋'], ['🍋','🍊','🍇'],
            ['🍊','🍒','🍋'], ['🍇','🍋','🍒']
        ];

        let scratching = false;
        let scratched = 0;
        let currentPrize = null;
        let canScratch = false;
        let revealed = false; // 是否已开奖
        let lastX = 0;
        let lastY = 0;
        let canvasW = 350;
        let canvasH = 240;

        function initCanvas() {
            canvasW = canvas.width;
            canvasH = canvas.height;

            ctx.clearRect(0, 0, canvasW, canvasH);
            ctx.globalCompositeOperation = 'source-over';

            // 主涂层 - 金属银色渐变
            let gradient = ctx.createLinearGradient(0, 0, canvasW, canvasH);
            gradient.addColorStop(0, '#b0b0b0');
            gradient.addColorStop(0.3, '#d0d0d0');
            gradient.addColorStop(0.5, '#c0c0c0');
            gradient.addColorStop(0.7, '#d8d8d8');
            gradient.addColorStop(1, '#a8a8a8');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvasW, canvasH);

            // 金属纹理
            for (let y = 0; y < canvasH; y += 2) {
                let b = 170 + Math.random() * 50;
                ctx.fillStyle = `rgba(${b},${b},${b},${0.3+Math.random()*0.3})`;
                ctx.fillRect(0, y, canvasW, 1);
            }

            // 光泽
            let shine = ctx.createLinearGradient(0, 0, canvasW*0.6, canvasH*0.6);
            shine.addColorStop(0, 'rgba(255,255,255,0)');
            shine.addColorStop(0.5, 'rgba(255,255,255,0.15)');
            shine.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = shine;
            ctx.fillRect(0, 0, canvasW, canvasH);

            // 颗粒
            for (let i = 0; i < 100; i++) {
                ctx.fillStyle = `rgba(255,255,255,${0.3+Math.random()*0.4})`;
                ctx.beginPath();
                ctx.arc(Math.random()*canvasW, Math.random()*canvasH, 1+Math.random()*2, 0, Math.PI*2);
                ctx.fill();
            }

            // 水印
            ctx.save();
            ctx.globalAlpha = 0.1;
            ctx.font = 'bold 30px Arial';
            ctx.fillStyle = '#666';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            for (let x = 50; x < canvasW; x += 120) {
                for (let y = 35; y < canvasH; y += 60) {
                    ctx.fillText('刮刮乐', x, y);
                }
            }
            ctx.restore();

            // 边框
            ctx.strokeStyle = 'rgba(255,215,0,0.4)';
            ctx.lineWidth = 2;
            ctx.strokeRect(6, 6, canvasW-12, canvasH-12);

            scratched = 0;
            canScratch = true;
            revealed = false;
            lastX = 0;
            lastY = 0;
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('progressText').textContent = '已刮 0% / 需要 80%';
            document.getElementById('scratchHint').style.display = 'block';

            card.classList.remove('card-win-shake', 'card-lose-shake', 'prize-bounce');
            let glow = card.querySelector('.win-glow');
            if (glow) glow.remove();
        }

        function createParticles(x, y) {
            for (let i = 0; i < 6; i++) {
                let p = document.createElement('div');
                p.className = 'scratch-particle';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                let angle = Math.random() * Math.PI * 2;
                let dist = 15 + Math.random() * 25;
                p.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
                p.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
                let size = 3 + Math.random() * 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.background = `hsl(0,0%,${70+Math.random()*30}%)`;
                card.appendChild(p);
                setTimeout(() => p.remove(), 800);
            }
        }

        function createSparks(x, y) {
            for (let i = 0; i < 3; i++) {
                let s = document.createElement('div');
                s.className = 'spark';
                s.style.left = x + 'px';
                s.style.top = y + 'px';
                let angle = Math.random() * Math.PI * 2;
                let dist = 25 + Math.random() * 35;
                s.style.setProperty('--dx', Math.cos(angle)*dist + 'px');
                s.style.setProperty('--dy', Math.sin(angle)*dist + 'px');
                card.appendChild(s);
                setTimeout(() => s.remove(), 600);
            }
        }

        function genPrize() {
            let luckBonus = G.luck * 0.02 + G.upgrades.luck.lv * G.upgrades.luck.eff;
            let jackBonus = G.upgrades.jackpot.lv * G.upgrades.jackpot.eff;
            let noPrizeChance = Math.max(0.1, 0.4 - luckBonus);

            if (Math.random() < noPrizeChance) {
                let s = missCombos[Math.floor(Math.random()*missCombos.length)];
                return { sym: s, name: '未中奖', mul: 0, win: false };
            }

            let totalW = 0;
            let adj = prizes.map(p => {
                let w = p.w;
                if (prizes.indexOf(p) >= 3) w *= (1 + luckBonus + jackBonus * 2);
                else w *= (1 + luckBonus);
                totalW += w;
                return { ...p, aw: w };
            });

            let r = Math.random() * totalW;
            for (let p of adj) {
                r -= p.aw;
                if (r <= 0) return { ...p, win: true };
            }
            return { ...adj[0], win: true };
        }

        function showPrize() {
            document.getElementById('pIcons').textContent = currentPrize.sym.join('');
            if (currentPrize.win) {
                let mulBonus = 1 + G.upgrades.multi.lv * G.upgrades.multi.eff;
                let amt = Math.floor(getPrice() * currentPrize.mul * mulBonus);
                document.getElementById('pAmount').textContent = '+' + amt;
                document.getElementById('pText').textContent = currentPrize.name;
            } else {
                document.getElementById('pAmount').textContent = '0';
                document.getElementById('pText').textContent = '未中奖';
            }
        }

        function getPrice() {
            let disc = 1 - G.upgrades.discount.lv * G.upgrades.discount.eff;
            return Math.max(5, Math.floor(G.basePrice * disc));
        }

        function doScratch(x, y) {
            if (!canScratch) return;

            document.getElementById('scratchHint').style.display = 'none';

            ctx.globalCompositeOperation = 'destination-out';

            // 主圆
            ctx.beginPath();
            ctx.arc(x, y, 18, 0, Math.PI*2);
            ctx.fill();

            // 连接线
            if (lastX > 0 && lastY > 0) {
                ctx.lineWidth = 36;
                ctx.lineCap = 'round';
                ctx.beginPath();
                ctx.moveTo(lastX, lastY);
                ctx.lineTo(x, y);
                ctx.stroke();
            }

            lastX = x;
            lastY = y;

            // 碎屑
            for (let i = 0; i < 3; i++) {
                let a = Math.random() * Math.PI * 2;
                let d = 12 + Math.random() * 18;
                ctx.beginPath();
                ctx.arc(x + Math.cos(a)*d, y + Math.sin(a)*d, 3+Math.random()*6, 0, Math.PI*2);
                ctx.fill();
            }

            createParticles(x, y);
            if (Math.random() > 0.6) createSparks(x, y);

            scratched += 2000;
            let totalPx = canvasW * canvasH;
            let progress = Math.min(100, (scratched / (totalPx * 0.8)) * 100);
            document.getElementById('progressFill').style.width = progress + '%';
            document.getElementById('progressText').textContent = `已刮 ${Math.floor(progress)}% / 需要 80%`;

            if (progress >= 100) {
                reveal();
            }
        }

        function reveal() {
            canScratch = false;
            revealed = true;

            document.getElementById('progressFill').style.width = '100%';
            document.getElementById('progressText').textContent = '已刮 100% / 开奖中...';

            // 闪光
            let flash = document.createElement('div');
            flash.className = 'reveal-flash';
            card.appendChild(flash);
            setTimeout(() => flash.remove(), 800);

            // 清除涂层
            let timer = setInterval(() => {
                ctx.globalCompositeOperation = 'destination-out';
                ctx.fillStyle = 'rgba(255,255,255,0.15)';
                ctx.fillRect(0, 0, canvasW, canvasH);
            }, 25);
            setTimeout(() => {
                clearInterval(timer);
                ctx.clearRect(0, 0, canvasW, canvasH);
            }, 600);

            card.classList.add('prize-bounce');

            if (currentPrize.win) {
                let mulBonus = 1 + G.upgrades.multi.lv * G.upgrades.multi.eff;
                let amt = Math.floor(getPrice() * currentPrize.mul * mulBonus);
                G.coins += amt;
                G.wins++;
                let expBonus = 1 + G.upgrades.expBoost.lv * G.upgrades.expBoost.eff;
                addExp(Math.floor(currentPrize.mul * expBonus));

                setTimeout(() => {
                    card.classList.add('card-win-shake');
                    let glow = document.createElement('div');
                    glow.className = 'win-glow';
                    card.insertBefore(glow, card.firstChild);
                    showCoins(amt);
                    popup('🎉 恭喜中奖！', '+' + amt + ' 金币');
                    playWinSound();
                }, 300);

                addHist(currentPrize.name, amt, true);
            } else {
                setTimeout(() => {
                    card.classList.add('card-lose-shake');
                    popup('😔 很遗憾', '未中奖');
                    playLoseSound();
                }, 300);
                addHist('未中奖', 0, false);
            }

            document.getElementById('pAmount').classList.add('amount-roll');
            G.scratches++;
            updateUI();
        }

        function addExp(n) {
            G.exp += n;
            while (G.exp >= G.expNeed) {
                G.exp -= G.expNeed;
                G.luck++;
                G.expNeed = Math.floor(G.expNeed * 1.5);
                popup('🍀 运气升级！', '等级 ' + G.luck);
            }
        }

        function showCoins(amt) {
            let el = document.getElementById('coinAnim');
            el.innerHTML = '';
            let n = Math.min(50, amt > 500 ? 40 : amt > 100 ? 25 : 12);
            for (let i = 0; i < n; i++) {
                let c = document.createElement('div');
                c.className = 'coin';
                c.textContent = '🪙';
                c.style.left = Math.random()*100 + '%';
                c.style.animationDuration = (1+Math.random()*2)+'s';
                c.style.animationDelay = Math.random()*0.7+'s';
                el.appendChild(c);
            }
            setTimeout(() => el.innerHTML = '', 3500);
        }

        function popup(title, content) {
            let el = document.getElementById('popup');
            document.getElementById('popText').textContent = title;
            document.getElementById('popAmount').textContent = content;
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 2500);
        }

        function addHist(name, amt, win) {
            G.history.unshift({ name, amt, win });
            if (G.history.length > 20) G.history.pop();
            let el = document.getElementById('history');
            el.innerHTML = G.history.map(h =>
                `<div class="history-item ${h.win?'h-win':'h-lose'}"><span>${h.name}</span><span>${h.win?'+'+h.amt:'-'+getPrice()}</span></div>`
            ).join('');
        }

        function buyCard() {
            let price = getPrice();
            if (G.coins < price) { popup('😅 金币不足', '需要 ' + price + ' 金币'); return; }
            if (!revealed && scratched > 0) { popup('⏳ 请等待', '请先刮完当前刮刮乐'); return; }

            G.coins -= price;
            currentPrize = genPrize();
            showPrize();

            card.classList.add('card-enter');
            setTimeout(() => card.classList.remove('card-enter'), 600);

            initCanvas();
            updateUI();
        }

        function buyUpgrade(key) {
            let u = G.upgrades[key];
            if (u.lv >= u.max) return;
            let cost = Math.floor(u.cost * Math.pow(1.5, u.lv));
            if (G.coins < cost) { popup('😅 金币不足', '需要 ' + cost + ' 金币'); return; }
            G.coins -= cost;
            u.lv++;
            popup('⬆️ 升级成功！', u.name + ' Lv.' + u.lv);
            updateUI();
        }

        function updateUI() {
            document.getElementById('coins').textContent = G.coins;
            document.getElementById('scratches').textContent = G.scratches;
            document.getElementById('wins').textContent = G.wins;
            document.getElementById('winRate').textContent = G.scratches ? Math.floor(G.wins/G.scratches*100)+'%' : '0%';
            document.getElementById('luckLv').textContent = G.luck;
            document.getElementById('luckFill').style.width = (G.exp/G.expNeed*100)+'%';
            document.getElementById('price').textContent = getPrice();

            let el = document.getElementById('upgradeList');
            el.innerHTML = '';
            Object.entries(G.upgrades).forEach(([k, u]) => {
                let cost = Math.floor(u.cost * Math.pow(1.5, u.lv));
                let maxed = u.lv >= u.max;
                let canBuy = G.coins >= cost;
                let d = document.createElement('div');
                d.className = 'upgrade-item' + (maxed ? ' maxed' : '');
                d.innerHTML = `
                    <div class="upgrade-header">
                        <span class="upgrade-name">${u.name}</span>
                        <span class="upgrade-lv">Lv.${u.lv}/${u.max}</span>
                    </div>
                    <div class="upgrade-desc">${u.desc}</div>
                    <button class="upgrade-btn ${maxed?'maxed':''}" onclick="buyUpgrade('${k}')" ${!canBuy&&!maxed?'disabled':''}>
                        ${maxed?'✓ 已满级':'升级 - '+cost+' 金币'}
                    </button>
                `;
                el.appendChild(d);
            });
        }

        // 音效
        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }

        function playScratchSound() {
            if (!audioCtx) return;
            try {
                let buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.04, audioCtx.sampleRate);
                let d = buf.getChannelData(0);
                for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*0.2;
                let src = audioCtx.createBufferSource();
                src.buffer = buf;
                let g = audioCtx.createGain();
                g.gain.value = 0.06;
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.04);
                src.connect(g);
                g.connect(audioCtx.destination);
                src.start();
            } catch(e) {}
        }

        function playWinSound() {
            if (!audioCtx) return;
            try {
                [523,659,784,1047].forEach((f,i) => {
                    let o = audioCtx.createOscillator();
                    let g = audioCtx.createGain();
                    o.connect(g);
                    g.connect(audioCtx.destination);
                    o.type = 'sine';
                    o.frequency.value = f;
                    g.gain.value = 0.1;
                    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3+i*0.12);
                    o.start(audioCtx.currentTime+i*0.12);
                    o.stop(audioCtx.currentTime+0.5+i*0.12);
                });
            } catch(e) {}
        }

        function playLoseSound() {
            if (!audioCtx) return;
            try {
                let o = audioCtx.createOscillator();
                let g = audioCtx.createGain();
                o.connect(g);
                g.connect(audioCtx.destination);
                o.frequency.value = 300;
                o.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime+0.3);
                g.gain.value = 0.08;
                g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime+0.3);
                o.start();
                o.stop(audioCtx.currentTime+0.3);
            } catch(e) {}
        }

        // 鼠标事件
        canvas.addEventListener('mousedown', e => {
            initAudio();
            scratching = true;
            let r = canvas.getBoundingClientRect();
            lastX = e.clientX - r.left;
            lastY = e.clientY - r.top;
            doScratch(lastX, lastY);
        });

        canvas.addEventListener('mousemove', e => {
            if (!scratching) return;
            let r = canvas.getBoundingClientRect();
            let x = e.clientX - r.left;
            let y = e.clientY - r.top;
            doScratch(x, y);
            if (Math.random() > 0.75) playScratchSound();
        });

        canvas.addEventListener('mouseup', () => { scratching = false; lastX = 0; lastY = 0; });
        canvas.addEventListener('mouseleave', () => { scratching = false; lastX = 0; lastY = 0; });

        // 触摸事件
        canvas.addEventListener('touchstart', e => {
            e.preventDefault();
            initAudio();
            scratching = true;
            let r = canvas.getBoundingClientRect();
            let t = e.touches[0];
            lastX = t.clientX - r.left;
            lastY = t.clientY - r.top;
            doScratch(lastX, lastY);
        });

        canvas.addEventListener('touchmove', e => {
            e.preventDefault();
            if (!scratching) return;
            let r = canvas.getBoundingClientRect();
            let t = e.touches[0];
            let x = t.clientX - r.left;
            let y = t.clientY - r.top;
            doScratch(x, y);
            if (Math.random() > 0.75) playScratchSound();
        });

        canvas.addEventListener('touchend', () => { scratching = false; lastX = 0; lastY = 0; });

        // 初始化
        currentPrize = genPrize();
        showPrize();
        initCanvas();
        updateUI();
    </script>
</body>
</html>
