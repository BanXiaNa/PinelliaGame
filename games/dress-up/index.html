<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ 换装小游戏 ✨</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
  font-family:'Microsoft YaHei',sans-serif;
  background:linear-gradient(135deg,#e8eaf6,#f3e5f5,#fce4ec,#e0f7fa);
  background-size:400% 400%;
  animation:bgShift 12s ease infinite;
  min-height:100vh;
  overflow-x:hidden;
}
@keyframes bgShift{
  0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}
}
h1{
  text-align:center;padding:16px;font-size:2em;letter-spacing:6px;
  background:linear-gradient(90deg,#e91e63,#9c27b0,#3f51b5,#00bcd4);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.game-wrap{
  display:flex;justify-content:center;gap:20px;padding:10px 16px 30px;flex-wrap:wrap;
}
/* Left: character */
.char-area{
  position:relative;
  background:rgba(255,255,255,0.75);
  border-radius:24px;
  box-shadow:0 8px 40px rgba(156,39,176,0.12);
  padding:20px;
  display:flex;flex-direction:column;align-items:center;
  min-width:340px;
}
canvas#charCanvas{
  border-radius:18px;
  cursor:pointer;
}
.char-info{
  margin-top:10px;font-size:0.85em;color:#7b1fa2;text-align:center;
}
/* Right: panels */
.right-panel{
  display:flex;flex-direction:column;gap:10px;min-width:240px;max-width:280px;
}
.panel{
  background:rgba(255,255,255,0.85);
  border-radius:16px;padding:14px;
  box-shadow:0 4px 18px rgba(0,0,0,0.05);
}
.panel h3{
  font-size:0.95em;color:#ad1457;margin-bottom:8px;
  border-bottom:2px solid #f8bbd0;padding-bottom:5px;
}
.cat-tabs{
  display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;
}
.cat-btn{
  padding:6px 10px;border:2px solid #f48fb1;border-radius:18px;
  background:#fff;cursor:pointer;font-size:0.78em;transition:all .2s;color:#880e4f;
}
.cat-btn:hover{background:#fce4ec;}
.cat-btn.active{
  background:linear-gradient(135deg,#f48fb1,#ce93d8);color:#fff;border-color:#ab47bc;
}
.item-grid{
  display:grid;grid-template-columns:repeat(4,1fr);gap:6px;
}
.item-card{
  background:#fff;border:2px solid #f3e5f5;border-radius:12px;
  padding:6px;cursor:pointer;text-align:center;transition:all .2s;
  font-size:0.72em;color:#6a1b9a;position:relative;
}
.item-card:hover{transform:scale(1.08);border-color:#ce93d8;}
.item-card.active{
  border-color:#e91e63;background:#fce4ec;
  box-shadow:0 0 10px rgba(233,30,99,0.25);
}
.item-card .preview{font-size:2em;display:block;height:42px;line-height:42px;}
.color-row{
  display:flex;flex-wrap:wrap;gap:5px;margin-top:6px;
}
.color-dot{
  width:24px;height:24px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .2s;
}
.color-dot:hover{transform:scale(1.25);}
.color-dot.active{border-color:#333;box-shadow:0 0 6px rgba(0,0,0,0.3);}
.action-row{
  display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;
}
.act-btn{
  flex:1;min-width:70px;padding:9px;border:none;border-radius:12px;
  cursor:pointer;font-size:0.82em;font-weight:bold;transition:all .2s;
}
.act-btn:hover{transform:scale(1.05);}
.ab-rand{background:#e3f2fd;color:#1565c0;}
.ab-reset{background:#fce4ec;color:#c62828;}
.ab-save{background:#e8f5e9;color:#2e7d32;}
.ab-undo{background:#fff3e0;color:#e65100;}
.ab-bg{background:#f3e5f5;color:#6a1b9a;}
#status{text-align:center;padding:5px;font-size:0.8em;color:#ad1457;
  background:rgba(255,255,255,0.6);border-radius:8px;margin-top:4px;}
@media(max-width:900px){.game-wrap{flex-direction:column;align-items:center;}}
</style>
</head>
<body>

<h1>✨ 换装小游戏 ✨</h1>
<div class="game-wrap">
  <div class="char-area">
    <canvas id="charCanvas" width="380" height="560"></canvas>
    <div class="char-info">点击右侧选择服装和配饰，为角色换装吧~ 👗</div>
  </div>
  <div class="right-panel">
    <div class="panel">
      <h3>📂 分类</h3>
      <div class="cat-tabs" id="catTabs"></div>
      <div class="item-grid" id="itemGrid"></div>
    </div>
    <div class="panel">
      <h3>🎨 颜色</h3>
      <div class="color-row" id="colorRow"></div>
    </div>
    <div class="panel">
      <h3>✨ 发型</h3>
      <div class="item-grid" id="hairGrid"></div>
    </div>
    <div class="panel">
      <h3>💍 配饰</h3>
      <div class="item-grid" id="accGrid"></div>
    </div>
    <div class="panel">
      <h3>⚡ 操作</h3>
      <div class="action-row">
        <button class="act-btn ab-undo" onclick="undo()">↩ 撤销</button>
        <button class="act-btn ab-rand" onclick="randomOutfit()">🎲 随机</button>
        <button class="act-btn ab-bg" onclick="cycleBg()">🖼 背景</button>
      </div>
      <div class="action-row">
        <button class="act-btn ab-reset" onclick="resetAll()">🗑 重置</button>
        <button class="act-btn ab-save" onclick="saveImg()">💾 保存</button>
      </div>
    </div>
    <div id="status">准备好了！选一个分类开始换装~ 👗</div>
  </div>
</div>

<script>
const C=document.getElementById('charCanvas'),X=C.getContext('2d'),W=C.width,H=C.height;

// === DATA ===
const categories=[
  {id:'top',name:'👚 上装',items:[
    {id:'t1',name:'T恤',emoji:'👕'},
    {id:'t2',name:'衬衫',emoji:'👔'},
    {id:'t3',name:'卫衣',emoji:'🧥'},
    {id:'t4',name:'背心',emoji:'🎽'},
    {id:'t5',name:'针织衫',emoji:'🧶'},
    {id:'t6',name:'西装',emoji:'🤵'},
    {id:'t7',name:'抹胸',emoji:'👙'},
    {id:'t8',name:'夹克',emoji:'🧥'},
  ]},
  {id:'bottom',name:'👖 下装',items:[
    {id:'b1',name:'短裙',emoji:'👗'},
    {id:'b2',name:'长裤',emoji:'👖'},
    {id:'b3',name:'短裤',emoji:'🩳'},
    {id:'b4',name:'百褶裙',emoji:'🩱'},
    {id:'b5',name:'阔腿裤',emoji:'👖'},
    {id:'b6',name:'包臀裙',emoji:'💃'},
    {id:'b7',name:'牛仔裤',emoji:'👖'},
    {id:'b8',name:'运动裤',emoji:'🏃'},
  ]},
  {id:'dress',name:'👗 连衣裙',items:[
    {id:'d1',name:'A字裙',emoji:'👗'},
    {id:'d2',name:'礼服',emoji:'👗'},
    {id:'d3',name:'旗袍',emoji:'👘'},
    {id:'d4',name:'洛丽塔',emoji:'🎀'},
    {id:'d5',name:'吊带裙',emoji:'👗'},
    {id:'d6',name:'蓬蓬裙',emoji:'🩰'},
    {id:'d7',name:'和服',emoji:'👘'},
    {id:'d8',name:'连体裤',emoji:'👖'},
  ]},
  {id:'shoe',name:'👠 鞋子',items:[
    {id:'s1',name:'高跟鞋',emoji:'👠'},
    {id:'s2',name:'运动鞋',emoji:'👟'},
    {id:'s3',name:'靴子',emoji:'👢'},
    {id:'s4',name:'凉鞋',emoji:'👡'},
    {id:'s5',name:'帆布鞋',emoji:'👞'},
    {id:'s6',name:'拖鞋',emoji:'🩴'},
    {id:'s7',name:'芭蕾鞋',emoji:'🩰'},
    {id:'s8',name:'马丁靴',emoji:'🥾'},
  ]},
];

const hairs=[
  {id:'h1',name:'长直发'},
  {id:'h2',name:'波浪卷'},
  {id:'h3',name:'短发'},
  {id:'h4',name:'双马尾'},
  {id:'h5',name:'丸子头'},
  {id:'h6',name:'麻花辫'},
  {id:'h7',name:'侧分长发'},
  {id:'h8',name:'短碎发'},
];
const accessories=[
  {id:'a1',name:'项链',emoji:'📿'},
  {id:'a2',name:'耳环',emoji:'💫'},
  {id:'a3',name:'发箍',emoji:'👑'},
  {id:'a4',name:'手链',emoji:'⭕'},
  {id:'a5',name:'帽子',emoji:'🎩'},
  {id:'a6',name:'眼镜',emoji:'👓'},
  {id:'a7',name:'蝴蝶结',emoji:'🎀'},
  {id:'a8',name:'翅膀',emoji:'🦋'},
];
const palette=[
  '#e91e63','#f44336','#ff5722','#ff9800','#ffc107','#ffeb3b',
  '#8bc34a','#4caf50','#009688','#00bcd4','#2196f3','#3f51b5',
  '#673ab7','#9c27b0','#795548','#607d8b','#212121','#ffffff',
  '#f8bbd0','#ce93d8','#90caf9','#a5d6a7','#ffe0b2','#d7ccc8',
];
const bgs=[
  {name:'粉色',c1:'#fce4ec',c2:'#f8bbd0'},
  {name:'紫色',c2:'#e1bee7',c1:'#f3e5f5'},
  {name:'蓝色',c1:'#e3f2fd',c2:'#bbdefb'},
  {name:'绿色',c1:'#e8f5e9',c2:'#c8e6c9'},
  {name:'米色',c1:'#fff8e1',c2:'#ffecb3'},
  {name:'灰色',c1:'#eceff1',c2:'#cfd8dc'},
  {name:'白色',c1:'#fafafa',c2:'#f5f5f5'},
  {name:'彩虹',c1:'#e8eaf6',c2:'#fce4ec'},
];

// State
let state={
  curCat:'top',curColor:'#e91e63',
  top:'t1',bottom:'b1',dress:null,shoe:'s1',
  hair:'h1',hairColor:'#4e342e',
  acc:[],bgIdx:0,
};
let historyStack=[];

function saveHist(){
  historyStack.push(JSON.parse(JSON.stringify(state)));
  if(historyStack.length>40)historyStack.shift();
}
function setStatus(m){document.getElementById('status').textContent=m;}

// === BUILD UI ===
function buildCatTabs(){
  const el=document.getElementById('catTabs');el.innerHTML='';
  categories.forEach(c=>{
    const b=document.createElement('button');
    b.className='cat-btn'+(state.curCat===c.id?' active':'');
    b.textContent=c.name;
    b.onclick=()=>{state.curCat=c.id;buildCatTabs();buildItems();buildColors();setStatus('已选: '+c.name);};
    el.appendChild(b);
  });
}
function buildItems(){
  const el=document.getElementById('itemGrid');el.innerHTML='';
  const cat=categories.find(c=>c.id===state.curCat);
  if(!cat)return;
  cat.items.forEach(it=>{
    const d=document.createElement('div');
    d.className='item-card'+(state[state.curCat]===it.id?' active':'');
    d.innerHTML=`<span class="preview">${it.emoji}</span>${it.name}`;
    d.onclick=()=>{
      saveHist();
      if(state.curCat==='top'){state.top=it.id;state.dress=null;}
      else if(state.curCat==='bottom'){state.bottom=it.id;state.dress=null;}
      else if(state.curCat==='dress'){state.dress=it.id;state.top=null;state.bottom=null;}
      else if(state.curCat==='shoe'){state.shoe=it.id;}
      buildItems();draw();setStatus('已换: '+it.name+' ✨');
    };
    el.appendChild(d);
  });
}
function buildColors(){
  const el=document.getElementById('colorRow');el.innerHTML='';
  palette.forEach(c=>{
    const d=document.createElement('div');
    d.className='color-dot'+(state.curColor===c?' active':'');
    d.style.background=c;
    d.onclick=()=>{state.curColor=c;buildColors();draw();};
    el.appendChild(d);
  });
}
function buildHair(){
  const el=document.getElementById('hairGrid');el.innerHTML='';
  hairs.forEach(h=>{
    const d=document.createElement('div');
    d.className='item-card'+(state.hair===h.id?' active':'');
    d.innerHTML=`<span class="preview">💇</span>${h.name}`;
    d.onclick=()=>{saveHist();state.hair=h.id;buildHair();draw();setStatus('发型: '+h.name);};
    el.appendChild(d);
  });
}
function buildAcc(){
  const el=document.getElementById('accGrid');el.innerHTML='';
  accessories.forEach(a=>{
    const d=document.createElement('div');
    d.className='item-card'+(state.acc.includes(a.id)?' active':'');
    d.innerHTML=`<span class="preview">${a.emoji}</span>${a.name}`;
    d.onclick=()=>{
      saveHist();
      if(state.acc.includes(a.id))state.acc=state.acc.filter(x=>x!==a.id);
      else{if(state.acc.length>=4)state.acc.shift();state.acc.push(a.id);}
      buildAcc();draw();setStatus('配饰: '+a.name+(state.acc.includes(a.id)?' ✅':' ❌'));
    };
    el.appendChild(d);
  });
}

// === DRAW ===
function draw(){
  const bg=bgs[state.bgIdx];
  let g=X.createLinearGradient(0,0,W,H);
  g.addColorStop(0,bg.c1);g.addColorStop(1,bg.c2);
  X.fillStyle=g;X.fillRect(0,0,W,H);

  // Floor shadow
  X.fillStyle='rgba(0,0,0,0.04)';
  X.beginPath();X.ellipse(W/2,H-30,120,18,0,0,Math.PI*2);X.fill();

  drawBody();
  if(state.dress)drawDress();
  else{drawTop();drawBottom();}
  drawShoes();
  drawHead();
  drawHair();
  drawAcc();
}

function drawBody(){
  // Skin
  X.fillStyle='#ffe0c2';
  // Neck
  X.fillRect(W/2-18,195,36,40);
  // Arms
  X.save();
  X.fillStyle='#ffe0c2';
  // Left arm
  X.beginPath();
  X.moveTo(W/2-70,240);X.quadraticCurveTo(W/2-95,320,W/2-85,400);
  X.lineTo(W/2-70,400);X.quadraticCurveTo(W/2-78,320,W/2-55,240);
  X.fill();
  // Right arm
  X.beginPath();
  X.moveTo(W/2+70,240);X.quadraticCurveTo(W/2+95,320,W/2+85,400);
  X.lineTo(W/2+70,400);X.quadraticCurveTo(W/2+78,320,W/2+55,240);
  X.fill();
  // Hands
  X.beginPath();X.arc(W/2-78,405,12,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(W/2+78,405,12,0,Math.PI*2);X.fill();
  X.restore();
  // Legs
  X.fillStyle='#ffe0c2';
  X.fillRect(W/2-35,430,28,110);
  X.fillRect(W/2+7,430,28,110);
}

function drawHead(){
  const cx=W/2,cy=140;
  X.fillStyle='#ffe8cc';
  X.beginPath();X.ellipse(cx,cy,62,72,0,0,Math.PI*2);X.fill();
  // Blush
  X.save();X.globalAlpha=0.2;
  X.fillStyle='#f48fb1';
  let bg=X.createRadialGradient(cx-38,cy+20,0,cx-38,cy+20,18);
  bg.addColorStop(0,'#f48fb1');bg.addColorStop(1,'rgba(255,255,255,0)');
  X.fillStyle=bg;X.beginPath();X.arc(cx-38,cy+20,18,0,Math.PI*2);X.fill();
  bg=X.createRadialGradient(cx+38,cy+20,0,cx+38,cy+20,18);
  bg.addColorStop(0,'#f48fb1');bg.addColorStop(1,'rgba(255,255,255,0)');
  X.fillStyle=bg;X.beginPath();X.arc(cx+38,cy+20,18,0,Math.PI*2);X.fill();
  X.restore();
  // Eyes
  X.fillStyle='#fff';
  X.beginPath();X.ellipse(cx-22,cy-5,14,10,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+22,cy-5,14,10,0,0,Math.PI*2);X.fill();
  let ig=X.createRadialGradient(cx-22,cy-7,2,cx-22,cy-5,9);
  ig.addColorStop(0,'#5d4037');ig.addColorStop(1,'#1a1a1a');
  X.fillStyle=ig;X.beginPath();X.ellipse(cx-22,cy-5,8,8,0,0,Math.PI*2);X.fill();
  ig=X.createRadialGradient(cx+22,cy-7,2,cx+22,cy-5,9);
  ig.addColorStop(0,'#5d4037');ig.addColorStop(1,'#1a1a1a');
  X.fillStyle=ig;X.beginPath();X.ellipse(cx+22,cy-5,8,8,0,0,Math.PI*2);X.fill();
  X.fillStyle='#000';
  X.beginPath();X.ellipse(cx-22,cy-5,4,4,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+22,cy-5,4,4,0,0,Math.PI*2);X.fill();
  X.fillStyle='#fff';
  X.beginPath();X.ellipse(cx-19,cy-8,2.5,2.5,0,0,Math.PI*2);X.fill();
  X.beginPath();X.ellipse(cx+25,cy-8,2.5,2.5,0,0,Math.PI*2);X.fill();
  // Lashes
  X.strokeStyle='#3e2723';X.lineWidth=2;
  X.beginPath();X.ellipse(cx-22,cy-5,15,11,0,Math.PI+0.3,-0.3);X.stroke();
  X.beginPath();X.ellipse(cx+22,cy-5,15,11,0,Math.PI+0.3,-0.3);X.stroke();
  // Brows
  X.strokeStyle='#5d4037';X.lineWidth=2.5;
  X.beginPath();X.moveTo(cx-35,cy-22);X.quadraticCurveTo(cx-22,cy-30,cx-8,cy-22);X.stroke();
  X.beginPath();X.moveTo(cx+35,cy-22);X.quadraticCurveTo(cx+22,cy-30,cx+8,cy-22);X.stroke();
  // Nose
  X.strokeStyle='#d4a574';X.lineWidth=1.2;
  X.beginPath();X.moveTo(cx,cy+10);X.quadraticCurveTo(cx-6,cy+28,cx-7,cy+30);X.stroke();
  X.beginPath();X.moveTo(cx,cy+10);X.quadraticCurveTo(cx+6,cy+28,cx+7,cy+30);X.stroke();
  // Mouth
  X.fillStyle='#e8967a';
  X.beginPath();
  X.moveTo(cx-14,cy+42);X.quadraticCurveTo(cx-7,cy+36,cx,cy+37);
  X.quadraticCurveTo(cx+7,cy+36,cx+14,cy+42);
  X.quadraticCurveTo(cx+7,cy+46,cx,cy+45);
  X.quadraticCurveTo(cx-7,cy+46,cx-14,cy+42);
  X.fill();
  X.fillStyle='#d4836a';
  X.beginPath();
  X.moveTo(cx-14,cy+42);X.quadraticCurveTo(cx,cy+52,cx+14,cy+42);
  X.quadraticCurveTo(cx,cy+46,cx-14,cy+42);X.fill();
}

function drawHair(){
  const cx=W/2,cy=140,hc=state.hairColor;
  X.fillStyle=hc;
  switch(state.hair){
    case'h1':// Long straight
      X.beginPath();X.ellipse(cx,cy-25,70,55,0,Math.PI,Math.PI*2);X.fill();
      X.fillRect(cx-72,cy-10,20,180);X.fillRect(cx+52,cy-10,20,180);
      X.fillStyle='rgba(255,255,255,0.06)';
      X.beginPath();X.ellipse(cx-15,cy-40,25,15,-0.3,0,Math.PI*2);X.fill();
      break;
    case'h2':// Wavy
      X.beginPath();X.ellipse(cx,cy-25,70,55,0,Math.PI,Math.PI*2);X.fill();
      for(let i=0;i<6;i++){
        X.beginPath();
        X.moveTo(cx-65+i*5,cy);
        X.quadraticCurveTo(cx-70+i*5,cy+40+i*10,cx-60+i*5,cy+80+i*15);
        X.quadraticCurveTo(cx-50+i*5,cy+60+i*10,cx-55+i*5,cy+30+i*5);
        X.fill();
      }
      for(let i=0;i<6;i++){
        X.beginPath();
        X.moveTo(cx+65-i*5,cy);
        X.quadraticCurveTo(cx+70-i*5,cy+40+i*10,cx+60-i*5,cy+80+i*15);
        X.quadraticCurveTo(cx+50-i*5,cy+60+i*10,cx+55-i*5,cy+30+i*5);
        X.fill();
      }
      break;
    case'h3':// Short
      X.beginPath();X.ellipse(cx,cy-25,68,52,0,Math.PI,Math.PI*2);X.fill();
      X.fillRect(cx-68,cy-10,18,55);X.fillRect(cx+50,cy-10,18,55);
      break;
    case'h4':// Twin tails
      X.beginPath();X.ellipse(cx,cy-25,66,50,0,Math.PI,Math.PI*2);X.fill();
      // Left tail
      X.beginPath();X.moveTo(cx-55,cy);X.quadraticCurveTo(cx-80,cy+60,cx-70,cy+150);
      X.quadraticCurveTo(cx-55,cy+140,cx-50,cy+60);X.fill();
      // Right tail
      X.beginPath();X.moveTo(cx+55,cy);X.quadraticCurveTo(cx+80,cy+60,cx+70,cy+150);
      X.quadraticCurveTo(cx+55,cy+140,cx+50,cy+60);X.fill();
      // Ties
      X.fillStyle='#e91e63';
      X.beginPath();X.ellipse(cx-57,cy+5,8,6,0,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(cx+57,cy+5,8,6,0,0,Math.PI*2);X.fill();
      X.fillStyle=hc;
      break;
    case'h5':// Bun
      X.beginPath();X.ellipse(cx,cy-25,66,50,0,Math.PI,Math.PI*2);X.fill();

      // Wide sleeves
      X.fillStyle=c;
      X.beginPath();X.moveTo(W/2-55,230);X.lineTo(W/2-95,260);X.lineTo(W/2-100,360);X.lineTo(W/2-55,340);X.fill();
      X.beginPath();X.moveTo(W/2+55,230);X.lineTo(W/2+95,260);X.lineTo(W/2+100,360);X.lineTo(W/2+55,340);X.fill();
      break;
    case'd8':// Jumpsuit
      X.fillStyle=c;
      X.beginPath();
      X.moveTo(W/2-45,232);X.lineTo(W/2-52,530);X.lineTo(W/2-12,530);
      X.lineTo(W/2-10,420);X.lineTo(W/2+10,420);
      X.lineTo(W/2+12,530);X.lineTo(W/2+52,530);
      X.lineTo(W/2+45,232);X.quadraticCurveTo(W/2,244,W/2-45,232);X.fill();
      // Sleeves
      X.beginPath();X.moveTo(W/2-45,234);X.lineTo(W/2-65,258);X.lineTo(W/2-55,295);X.lineTo(W/2-38,262);X.fill();
      X.beginPath();X.moveTo(W/2+45,234);X.lineTo(W/2+65,258);X.lineTo(W/2+55,295);X.lineTo(W/2+38,262);X.fill();
      // Belt
      X.fillStyle='rgba(0,0,0,0.08)';
      X.fillRect(W/2-48,340,96,8);
      break;
  }
}

function drawShoes(){
  const c=state.curColor;
  X.fillStyle=c;
  switch(state.shoe){
    case's1':// Heels
      X.beginPath();X.moveTo(W/2-32,535);X.lineTo(W/2-38,545);X.lineTo(W/2-15,545);X.lineTo(W/2-20,535);X.fill();
      X.beginPath();X.moveTo(W/2+32,535);X.lineTo(W/2+38,545);X.lineTo(W/2+15,545);X.lineTo(W/2+20,535);X.fill();
      // Heel
      X.fillRect(W/2-36,540,4,15);X.fillRect(W/2+32,540,4,15);
      // Point
      X.beginPath();X.moveTo(W/2-38,545);X.lineTo(W/2-45,548);X.lineTo(W/2-35,548);X.fill();
      X.beginPath();X.moveTo(W/2+38,545);X.lineTo(W/2+45,548);X.lineTo(W/2+35,548);X.fill();
      break;
    case's2':// Sneakers
      X.fillStyle=c;
      X.beginPath();X.roundRect(W/2-42,533,30,16,4);X.fill();
      X.beginPath();X.roundRect(W/2+12,533,30,16,4);X.fill();
      // Sole
      X.fillStyle='rgba(255,255,255,0.4)';
      X.fillRect(W/2-42,545,30,5);X.fillRect(W/2+12,545,30,5);
      // Laces
      X.strokeStyle='rgba(255,255,255,0.5)';X.lineWidth=1;
      X.beginPath();X.moveTo(W/2-32,536);X.lineTo(W/2-20,536);X.stroke();
      X.beginPath();X.moveTo(W/2+22,536);X.lineTo(W/2+34,536);X.stroke();
      break;
    case's3':// Boots
      X.fillStyle=c;
      X.beginPath();X.roundRect(W/2-40,490,28,60,4);X.fill();
      X.beginPath();X.roundRect(W/2+12,490,28,60,4);X.fill();
      // Top
      X.fillStyle='rgba(255,255,255,0.1)';
      X.fillRect(W/2-40,490,28,8);X.fillRect(W/2+12,490,28,8);
      break;
    case's4':// Sandals
      X.fillStyle=c;
      X.beginPath();X.ellipse(W/2-27,545,18,7,0,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(W/2+27,545,18,7,0,0,Math.PI*2);X.fill();
      // Straps
      X.strokeStyle=c;X.lineWidth=3;
      X.beginPath();X.moveTo(W/2-38,538);X.lineTo(W/2-16,538);X.stroke();
      X.beginPath();X.moveTo(W/2+16,538);X.lineTo(W/2+38,538);X.stroke();
      break;
    case's5':// Canvas
      X.fillStyle=c;
      X.beginPath();X.roundRect(W/2-40,533,28,18,6);X.fill();
      X.beginPath();X.roundRect(W/2+12,533,28,18,6);X.fill();
      X.fillStyle='rgba(255,255,255,0.3)';
      X.beginPath();X.arc(W/2-26,540,5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(W/2+26,540,5,0,Math.PI*2);X.fill();
      break;
    case's6':// Slippers
      X.fillStyle=c;
      X.beginPath();X.ellipse(W/2-27,547,22,8,0,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(W/2+27,547,22,8,0,0,Math.PI*2);X.fill();
      // Thong
      X.strokeStyle=c;X.lineWidth=2;
      X.beginPath();X.moveTo(W/2-27,540);X.lineTo(W/2-27,533);X.stroke();
      X.beginPath();X.moveTo(W/2+27,540);X.lineTo(W/2+27,533);X.stroke();
      break;
    case's7':// Ballet
      X.fillStyle=c;
      X.beginPath();X.ellipse(W/2-27,545,16,8,0,0,Math.PI*2);X.fill();
      X.beginPath();X.ellipse(W/2+27,545,16,8,0,0,Math.PI*2);X.fill();
      // Ribbons
      X.strokeStyle=c;X.lineWidth=1.5;
      X.beginPath();X.moveTo(W/2-30,538);X.quadraticCurveTo(W/2-40,520,W/2-25,510);X.stroke();
      X.beginPath();X.moveTo(W/2+30,538);X.quadraticCurveTo(W/2+40,520,W/2+25,510);X.stroke();
      break;
    case's8':// Martin boots
      X.fillStyle=c;
      X.beginPath();X.roundRect(W/2-40,485,28,65,4);X.fill();
      X.beginPath();X.roundRect(W/2+12,485,28,65,4);X.fill();
      // Sole
      X.fillStyle='rgba(0,0,0,0.15)';
      X.fillRect(W/2-42,545,32,6);X.fillRect(W/2+10,545,32,6);
      // Laces
      X.strokeStyle='rgba(255,255,255,0.4)';X.lineWidth=1;
      for(let i=0;i<3;i++){
        X.beginPath();X.moveTo(W/2-35,492+i*10);X.lineTo(W/2-18,492+i*10);X.stroke();
        X.beginPath();X.moveTo(W/2+18,492+i*10);X.lineTo(W/2+35,492+i*10);X.stroke();
      }
      break;
  }
}

function drawAcc(){
  const cx=W/2,cy=140;
  state.acc.forEach(a=>{
    switch(a){
      case'a1':// Necklace
        X.strokeStyle='#ffd700';X.lineWidth=2;
        X.beginPath();X.arc(cx,220,25,0.2,Math.PI-0.2);X.stroke();
        X.fillStyle='#ffd700';X.beginPath();X.moveTo(cx,245);X.lineTo(cx-5,252);X.lineTo(cx+5,252);X.fill();
        break;
      case'a2':// Earrings
        X.fillStyle='#ffd700';
        X.beginPath();X.arc(cx-65,cy+25,4,0,Math.PI*2);X.fill();
        X.beginPath();X.arc(cx+65,cy+25,4,0,Math.PI*2);X.fill();
        X.beginPath();X.moveTo(cx-65,cy+29);X.lineTo(cx-65,cy+40);X.lineTo(cx-60,cy+35);X.fill();
        X.beginPath();X.moveTo(cx+65,cy+29);X.lineTo(cx+65,cy+40);X.lineTo(cx+60,cy+35);X.fill();
        break;
      case'a3':// Tiara
        X.fillStyle='#ffd700';
        X.beginPath();
        X.moveTo(cx-30,cy-70);X.lineTo(cx-20,cy-85);X.lineTo(cx-10,cy-72);
        X.lineTo(cx,cy-90);X.lineTo(cx+10,cy-72);
        X.lineTo(cx+20,cy-85);X.lineTo(cx+30,cy-70);
        X.quadraticCurveTo(cx,cy-65,cx-30,cy-70);X.fill();
        X.fillStyle='#e91e63';X.beginPath();X.arc(cx,cy-82,3,0,Math.PI*2);X.fill();
        break;
      case'a4':// Bracelet
        X.strokeStyle='#ffd700';X.lineWidth=2.5;
        X.beginPath();X.arc(cx-78,400,10,0,Math.PI*2);X.stroke();
        X.fillStyle='#e91e63';X.beginPath();X.arc(cx-78,392,3,0,Math.PI*2);X.fill();
        break;
      case'a5':// Hat
        X.fillStyle=state.curColor;
        X.beginPath();X.ellipse(cx,cy-68,55,12,0,0,Math.PI*2);X.fill();
        X.beginPath();X.ellipse(cx,cy-78,35,22,0,0,Math.PI*2);X.fill();
        X.fillStyle='rgba(255,255,255,0.2)';
        X.beginPath();X.ellipse(cx-10,cy-85,15,8,-0.2,0,Math.PI*2);X.fill();
        break;
      case'a6':// Glasses
        X.strokeStyle='#333';X.lineWidth=2.5;
        X.beginPath();X.arc(cx-22,cy-5,15,0,Math.PI*2);X.stroke();
        X.beginPath();X.arc(cx+22,cy-5,15,0,Math.PI*2);X.stroke();
        X.beginPath();X.moveTo(cx-7,cy-5);X.lineTo(cx+7,cy-5);X.stroke();
        X.beginPath();X.moveTo(cx-37,cy-5);X.lineTo(cx-55,cy-10);X.stroke();
        X.beginPath();X.moveTo(cx+37,cy-5);X.lineTo(cx+55,cy-10);X.stroke();
        break;
      case'a7':// Bow
        X.fillStyle='#e91e63';
        X.beginPath();X.ellipse(cx-15,cy-65,14,10,-0.3,0,Math.PI*2);X.fill();
        X.beginPath();X.ellipse(cx+15,cy-65,14,10,0.3,0,Math.PI*2);X.fill();
        X.fillStyle='#c2185b';X.beginPath();X.arc(cx,cy-65,5,0,Math.PI*2);X.fill();
        break;
      case'a8':// Wings
        X.save();X.globalAlpha=0.3;
        X.fillStyle='#e1bee7';
        // Left wing
        X.beginPath();
        X.moveTo(cx-50,280);X.quadraticCurveTo(cx-130,230,cx-120,310);
        X.quadraticCurveTo(cx-100,350,cx-50,330);X.fill();
        // Right wing
        X.beginPath();
        X.moveTo(cx+50,280);X.quadraticCurveTo(cx+130,230,cx+120,310);
        X.quadraticCurveTo(cx+100,350,cx+50,330);X.fill();
        X.restore();
        break;
    }
  });
}

function lighten(hex,amt){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt);g=Math.min(255,g+amt);b=Math.min(255,b+amt);
  return`rgb(${r},${g},${b})`;
}

// === ACTIONS ===
function undo(){
  if(historyStack.length){
    state=historyStack.pop();
    buildAll();draw();setStatus('已撤销 ↩');
  }
}
function resetAll(){
  if(!confirm('确定要重置所有吗？'))return;
  saveHist();
  state={curCat:'top',curColor:'#e91e63',top:'t1',bottom:'b1',dress:null,shoe:'s1',
    hair:'h1',hairColor:'#4e342e',acc:[],bgIdx:0};
  buildAll();draw();setStatus('已重置 🌟');
}
function randomOutfit(){
  saveHist();
  const rc=()=>palette[Math.floor(Math.random()*palette.length)];
  state.curColor=rc();
  if(Math.random()>0.4){
    state.dress='d'+(1+Math.floor(Math.random()*8));
    state.top=null;state.bottom=null;
  }else{
    state.dress=null;
    state.top='t'+(1+Math.floor(Math.random()*8));
    state.bottom='b'+(1+Math.floor(Math.random()*8));
  }
  state.shoe='s'+(1+Math.floor(Math.random()*8));
  state.hair='h'+(1+Math.floor(Math.random()*8));
  state.hairColor=rc();
  state.acc=[];
  if(Math.random()>0.5)state.acc.push('a'+(1+Math.floor(Math.random()*8)));
  if(Math.random()>0.7)state.acc.push('a'+(1+Math.floor(Math.random()*8)));
  state.bgIdx=Math.floor(Math.random()*bgs.length);
  buildAll();draw();setStatus('随机搭配已生成！🎲');
}
function cycleBg(){
  state.bgIdx=(state.bgIdx+1)%bgs.length;
  draw();setStatus('背景: '+bgs[state.bgIdx].name+' 🖼');
}
function saveImg(){
  const link=document.createElement('a');
  link.download='换装_'+Date.now()+'.png';
  link.href=C.toDataURL('image/png');
  link.click();
  setStatus('已保存 💾');
}

function buildAll(){
  buildCatTabs();buildItems();buildColors();buildHair();buildAcc();
}

// Init
buildAll();draw();
</script>
