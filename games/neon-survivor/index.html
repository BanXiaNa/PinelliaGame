<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>霓虹幸存者</title>
<style>
:root {
  --neon-blue: #00d4ff; --neon-red: #ff3366; --neon-green: #00ff88;
  --neon-yellow: #ffcc00; --neon-purple: #cc66ff; --neon-orange: #ff8800;
  --bg-dark: #0a0a1a; --bg-card: rgba(15,15,35,0.9); --border: rgba(100,100,255,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { background:var(--bg-dark); color:#e0e0ff; font-family:'Segoe UI',system-ui,sans-serif; overflow:hidden; height:100vh; }
canvas { display:block; }

/* Character Select */
#char-select { position:fixed; inset:0; background:var(--bg-dark); display:flex; flex-direction:column; align-items:center; justify-content:center; z-index:100; }
#char-select h1 { font-size:3em; margin-bottom:8px; background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
#char-select .sub { color:#8888bb; margin-bottom:30px; font-size:1.1em; }
.cards { display:flex; gap:20px; flex-wrap:wrap; justify-content:center; max-width:1000px; }
.char-card { background:var(--bg-card); border:2px solid var(--border); border-radius:16px; padding:24px 20px; width:150px; text-align:center; cursor:pointer; transition:all .2s; }
.char-card:hover { border-color:var(--neon-blue); transform:translateY(-6px); box-shadow:0 0 20px rgba(0,212,255,0.15); }
.char-card .icon { font-size:2.8em; margin-bottom:8px; }
.char-card .name { font-weight:bold; font-size:1.05em; margin-bottom:6px; color:#fff; }
.char-card .type { font-size:.75em; color:#8888bb; text-transform:uppercase; letter-spacing:1px; margin-bottom:10px; }
.char-card .stats { text-align:left; font-size:.78em; }
.char-card .stats div { display:flex; justify-content:space-between; margin:3px 0; }
.char-card .stats .label { color:#8888bb; }
.char-card .atk { margin-top:10px; font-size:.78em; color:var(--neon-yellow); background:rgba(255,204,0,0.08); padding:6px 8px; border-radius:8px; }
.char-card .diff { margin-top:8px; font-size:.7em; color:#666; }

/* HUD */
#hud { position:fixed; top:0; left:0; right:0; padding:12px 20px; display:flex; justify-content:space-between; pointer-events:none; z-index:10; }
.hud-left, .hud-right, .hud-center { display:flex; flex-direction:column; gap:6px; }
.hud-center { align-items:center; }
.bar-wrap { width:220px; height:16px; background:rgba(0,0,0,0.6); border-radius:8px; border:1px solid rgba(255,255,255,0.1); overflow:hidden; position:relative; }
.bar-fill { height:100%; border-radius:8px; transition:width .2s; }
.bar-text { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); font-size:.7em; font-weight:bold; text-shadow:0 0 4px #000; }
.wave-text { font-size:1.8em; font-weight:bold; text-shadow:0 0 10px var(--neon-blue); }
.wave-sub { font-size:.85em; color:#8888bb; }
.level-text { font-size:.9em; color:var(--neon-yellow); }
.cooldown-text { font-size:.75em; color:#8888bb; }
.controls-hint { font-size:.65em; color:#555; }

/* Traits */
#traits { position:fixed; bottom:12px; right:12px; display:flex; gap:6px; z-index:10; pointer-events:none; }
.trait-badge { padding:4px 10px; border-radius:12px; font-size:.75em; font-weight:bold; display:flex; align-items:center; gap:4px; }

/* Level Up */
#level-up { position:fixed; inset:0; background:rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:50; }
#level-up.show { display:flex; }
.level-title { text-align:center; margin-bottom:24px; }
.level-title h2 { font-size:2.2em; background:linear-gradient(135deg,var(--neon-yellow),var(--neon-orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
.rewards { display:flex; gap:20px; }
.reward-card { background:var(--bg-card); border:2px solid var(--border); border-radius:16px; padding:24px; width:200px; text-align:center; cursor:pointer; transition:all .2s; }
.reward-card:hover { transform:translateY(-6px); }
.reward-card .r-icon { font-size:2.2em; margin-bottom:8px; }
.reward-card .r-name { font-weight:bold; font-size:1.05em; margin-bottom:4px; }
.reward-card .r-trait { font-size:.72em; padding:3px 10px; border-radius:10px; display:inline-block; margin-bottom:8px; }
.reward-card .r-desc { font-size:.8em; color:#aaa; line-height:1.4; }
.reward-card .r-rarity { font-size:.7em; margin-top:8px; text-transform:uppercase; letter-spacing:1px; }
.reward-card.r-common { border-color:#555; } .reward-card.r-uncommon { border-color:var(--neon-green); }
.reward-card.r-rare { border-color:var(--neon-blue); } .reward-card.r-epic { border-color:var(--neon-purple); }

/* Boss Warning */
#boss-warn { position:fixed; inset:0; background:rgba(255,0,0,0.08); display:none; align-items:center; justify-content:center; z-index:40; pointer-events:none; }
#boss-warn.show { display:flex; animation:flash .5s ease-in-out 3; }
@keyframes flash { 0%,100%{opacity:0} 50%{opacity:1} }
#boss-warn h2 { font-size:3em; color:var(--neon-red); text-shadow:0 0 30px var(--neon-red); animation:pulse .8s ease-in-out infinite; }
@keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }

/* Boss HP */
#boss-hp { position:fixed; bottom:50px; left:50%; transform:translateX(-50%); width:400px; display:none; z-index:10; pointer-events:none; }
#boss-hp.show { display:block; }
#boss-hp .name { text-align:center; font-size:1.1em; font-weight:bold; color:var(--neon-red); text-shadow:0 0 10px var(--neon-red); margin-bottom:4px; }
#boss-hp .bar-wrap { width:100%; height:12px; }

/* Game Over */
#game-over { position:fixed; inset:0; background:rgba(0,0,0,0.9); display:none; align-items:center; justify-content:center; z-index:60; flex-direction:column; }
#game-over.show { display:flex; }
#game-over h2 { font-size:3em; color:var(--neon-red); text-shadow:0 0 20px var(--neon-red); margin-bottom:8px; }
#game-over .stats { font-size:1.1em; color:#aaa; margin-bottom:24px; text-align:center; line-height:1.8; }
#game-over button { padding:14px 40px; font-size:1.1em; background:linear-gradient(135deg,var(--neon-blue),var(--neon-purple)); border:none; border-radius:12px; color:#fff; cursor:pointer; font-weight:bold; }
#game-over button:hover { transform:scale(1.05); }
</style>
</head>

// ============================================================
// UTILITIES
// ============================================================
const dist = (a,b) => Math.hypot(b.x-a.x, b.y-a.y);
const angle = (a,b) => Math.atan2(b.y-a.y, b.x-a.x);
const lerp = (a,b,t) => a+(b-a)*t;
const clamp = (v,min,max) => Math.max(min, Math.min(max, v));
const rand = (a,b) => Math.random()*(b-a)+a;
const randInt = (a,b) => Math.floor(rand(a,b+1));
const chance = (p) => Math.random() < p;

function normalizeAngle(a) { while(a>PI)a-=TAU; while(a<-PI)a+=TAU; return a; }
function pickRarity() { const r=Math.random(); return r<0.4?'common':r<0.7?'uncommon':r<0.9?'rare':'epic'; }
function xpFor(lv) { return Math.floor(XP_BASE * Math.pow(XP_MULT, lv-1)); }

// ============================================================
// GAME CLASS
// ============================================================
class Game {
  constructor() {
    this.canvas = document.getElementById('canvas');
    this.ctx = this.canvas.getContext('2d');
    this.resize();
    this.keys = {};
    this.mouse = { x:0, y:0, down:false, right:false };
    this.setupInput();
    window.addEventListener('resize', () => this.resize());
  }

  resize() {
    this.W = this.canvas.width = window.innerWidth;
    this.H = this.canvas.height = window.innerHeight;
  }

  setupInput() {
    document.addEventListener('keydown', e => { this.keys[e.key.toLowerCase()] = true; e.preventDefault(); });
    document.addEventListener('keyup', e => { this.keys[e.key.toLowerCase()] = false; });
    this.canvas.addEventListener('mousemove', e => { this.mouse.x = e.clientX - this.W/2; this.mouse.y = e.clientY - this.H/2; });
    this.canvas.addEventListener('mousedown', e => { if(e.button===0) this.mouse.down=true; if(e.button===2) this.mouse.right=true; });
    this.canvas.addEventListener('mouseup', e => { if(e.button===0) this.mouse.down=false; if(e.button===2) this.mouse.right=false; });
    this.canvas.addEventListener('contextmenu', e => e.preventDefault());
  }

  init(charId) {
    const c = CHARS.find(ch => ch.id === charId);
    this.char = c;
    this.player = {
      x:WORLD_W/2, y:WORLD_H/2, size:16,
      hp:c.maxHp, maxHp:c.maxHp, shield:0,
      speed:c.speed, level:1, xp:0, xpNeeded:xpFor(1),
      atkCd:0, specCdTimer:0, dodgeCd:0, dodgeTimer:0,
      facing:0, moving:false, attackAnim:0, dashVx:0, dashVy:0, dashTimer:0,
      invisible:false, invisibleTimer:0, shieldWallTimer:0, turretTimer:0
    };
    this.cam = { x:this.player.x, y:this.player.y };
    this.projectiles = []; this.particles = []; this.dmgNums = [];
    this.enemies = []; this.xpGems = []; this.bosses = [];
    this.wave = 0; this.waveTimer = 3; this.waveActive = false;
    this.waveEnemiesLeft = 0; this.waveSpawnQueue = [];
    this.effects = {
      fireBullet:false, fireShield:false, fireStorm:false, fireTrail:false, fireDmgMult:1,
      iceBullet:false, iceArmor:0, blizzard:false, frostNova:false, freezeDmgMult:1,
      chainLightning:0, thunderStrike:0, electricField:false,
      critChance:0.1, dodgeChance:0, shadowBurst:false, darkPact:false,
      regenRate:0, holyShield:false, holyShieldCd:15, xpMult:1, healOnKill:0, resurrection:false,
      atkRateMult:1, dmgMult:1, speedMult:1, projSpeedMult:1, projCountBonus:0, piercing:0,
      bouncy:0, orbitShield:0, orbitAngle:0
    };
    this.traitPts = { fire:0, ice:0, lightning:0, shadow:0, holy:0 };
    this.traitActive = {};
    this.rewardList = []; this.bossRewardPending = false;
    this.time = 0; this.screenShake = 0; this.gameOver = false;
    this.killCount = 0; this.totalDmg = 0;
    this.t = { fireShield:0, fireStorm:0, fireTrail:0, frostNova:0, holyShield:0, electricField:0, orbit:0 };
  }

  start() {
    document.getElementById('char-select').style.display = 'none';
    document.getElementById('hud').style.display = 'flex';
    this.running = true;
    this.lastTime = performance.now();
    requestAnimationFrame(ts => this.loop(ts));
  }

  loop(ts) {
    if(!this.running) return;
    const dt = Math.min((ts - this.lastTime)/1000, 0.05);
    this.lastTime = ts;
    this.time += dt;
    if(!this.gameOver) {
      this.update(dt);
      this.render();
    }
    requestAnimationFrame(ts2 => this.loop(ts2));
  }

  // ---- UPDATE ----
  update(dt) {
    const p = this.player;
    // Movement
    let dx=0, dy=0;
    if(this.keys['w']||this.keys['arrowup']) dy=-1;
    if(this.keys['s']||this.keys['arrowdown']) dy=1;
    if(this.keys['a']||this.keys['arrowleft']) dx=-1;
    if(this.keys['d']||this.keys['arrowright']) dx=1;

    if(p.dashTimer > 0) {
      p.dashTimer -= dt;
      p.x += p.dashVx * dt * 60; p.y += p.dashVy * dt * 60;
    } else {
      const len = Math.hypot(dx,dy);
      if(len > 0) {
        const sp = p.speed * this.effects.speedMult * 60 * dt;
        p.x += dx/len*sp; p.y += dy/len*sp;
        p.moving = true;
      } else { p.moving = false; }
    }
    p.x = clamp(p.x, p.size, WORLD_W-p.size);
    p.y = clamp(p.y, p.size, WORLD_H-p.size);
    p.facing = Math.atan2(this.mouse.y, this.mouse.x);

    // Dodge
    if(this.keys[' '] && p.dodgeCd<=0 && p.dodgeTimer<=0) {
      const da = p.facing;
      p.dashVx = Math.cos(da)*8; p.dashVy = Math.sin(da)*8;
      p.dodgeTimer = 0.15; p.dodgeCd = 1;
      this.spawnParticles(p.x, p.y, '#00d4ff', 8, 3);
    }
    if(p.dodgeTimer > 0) p.dodgeTimer -= dt;
    if(p.dodgeCd > 0) p.dodgeCd -= dt;
    const isDodging = p.dodgeTimer > 0;

    // Cooldowns
    if(p.atkCd > 0) p.atkCd -= dt;
    if(p.specCdTimer > 0) p.specCdTimer -= dt;
    if(p.attackAnim > 0) p.attackAnim -= dt;
    if(p.invisibleTimer > 0) { p.invisibleTimer -= dt; p.invisible = true; } else { p.invisible = false; }
    if(p.shieldWallTimer > 0) p.shieldWallTimer -= dt;
    if(p.turretTimer > 0) p.turretTimer -= dt;

    // Attack
    if(this.mouse.down && p.atkCd<=0 && p.dashTimer<=0) this.playerAttack();

    // Special
    if(this.mouse.right && p.specCdTimer<=0) { this.useSpecial(); this.mouse.right=false; }

    // Regen
    if(this.effects.regenRate > 0) p.hp = Math.min(p.maxHp, p.hp + this.effects.regenRate * dt);

    // Shield regen
    if(p.shield < 0) p.shield = 0;

    // Dodge invincibility
    const isInvincible = isDodging || p.invisible || p.shieldWallTimer > 0;

    // Fire trail
    if(this.effects.fireTrail && p.moving && (this.time - this.t.fireTrail) > 0.1) {
      this.t.fireTrail = this.time;
      this.projectiles.push({ x:p.x, y:p.y, vx:0, vy:0, dmg:5, size:15, color:'#ff4400',
        life:1, maxLife:1, pierce:999, isFireTrail:true, friendly:true });
    }

    // Periodic effects
    if(this.effects.fireShield) {
      this.t.fireShield += dt;
      if(this.t.fireShield >= 0.5) {
        this.t.fireShield = 0;
        this.enemies.forEach(e => { if(dist(p,e)<80) this.damageEnemy(e, 3, p.x, p.y); });
        this.bosses.forEach(b => { if(dist(p,b)<80) this.damageBoss(b, 3, p.x, p.y); });
      }
    }

    if(this.effects.fireStorm && (this.time - this.t.fireStorm) > (this.effects.fireStormCd||8)) {
      this.t.fireStorm = this.time;
      this.spawnAoE(p.x, p.y, 150, 80, '#ff4400');
      this.screenShake = 0.3;
    }

    if(this.effects.frostNova && (this.time - this.t.frostNova) > (this.effects.frostNovaCd||10)) {
      this.t.frostNova = this.time;
      this.enemies.forEach(e => { if(dist(p,e)<150) { e.frozen=2; this.spawnParticles(e.x,e.y,'#00ccff',6,2); } });
      this.bosses.forEach(b => { if(dist(p,b)<150) b.frozen=1.5; });
      this.spawnParticles(p.x, p.y, '#00ccff', 30, 4);
    }

    if(this.effects.electricField) {
      this.t.electricField += dt;
      if(this.t.electricField >= 1) {
        this.t.electricField = 0;
        this.enemies.forEach(e => { if(dist(p,e)<120) { this.damageEnemy(e, 8, p.x, p.y); this.spawnParticles(e.x,e.y,'#ffcc00',3,2); } });
      }
    }

    if(this.effects.holyShield && (this.time - this.t.holyShield) > (this.effects.holyShieldCd||15)) {
      this.t.holyShield = this.time;
      p.shield += 20;
      this.spawnParticles(p.x, p.y, '#ffdd44', 15, 3);
    }

    // Turret auto-fire
    if(p.turretTimer > 0) {
      this.t.turret = (this.t.turret||0) + dt;
      if(this.t.turret >= 0.25) {
        this.t.turret = 0;
        let closest = null, minD = 400;
        this.enemies.forEach(e => { const d=dist(p,e); if(d<minD){minD=d;closest=e;} });
        this.bosses.forEach(b => { const d=dist(p,b); if(d<minD){minD=d;closest=b;} });
        if(closest) {
          const a = angle(p, closest);
          const tx = p.x+Math.cos(p.facing)*40, ty = p.y+Math.sin(p.facing)*40;
          this.projectiles.push({ x:tx, y:ty, vx:Math.cos(a)*8, vy:Math.sin(a)*8,
            dmg:this.char.atkDmg*0.6, size:4, color:'#00d4ff', life:1.5, maxLife:1.5, pierce:1, friendly:true, fromPlayer:true });
        }
      }
    }

    // Orbit shield
    if(this.effects.orbitShield > 0) {
      this.t.orbit += dt * 2;
      for(let i=0;i<this.effects.orbitShield;i++) {
        const a = this.t.orbit + (TAU/this.effects.orbitShield)*i;
        const ox = p.x + Math.cos(a)*60, oy = p.y + Math.sin(a)*60;
        this.enemies.forEach(e => {
          if(dist({x:ox,y:oy},e) < 20) { this.damageEnemy(e, 15*dt*60, ox, oy); }
        });
        this.bosses.forEach(b => {
          if(dist({x:ox,y:oy},b) < 20+b.size) { this.damageBoss(b, 15*dt*60, ox, oy); }
        });
      }
    }

    // Wave management
    if(!this.waveActive) {
      this.waveTimer -= dt;
      if(this.waveTimer <= 0) this.startWave();
    } else {
      // Spawn queued enemies
      if(this.waveSpawnQueue.length > 0 && this.enemies.length < 50) {
        const e = this.waveSpawnQueue.shift();
        this.spawnEnemy(e.type, e.x, e.y);
      }
      // Check wave complete
      if(this.waveEnemiesLeft <= 0 && this.enemies.length===0 && this.bosses.length===0 && this.waveSpawnQueue.length===0) {
        this.waveActive = false;
        this.waveTimer = 3;
        if(this.bossRewardPending) { this.bossRewardPending=false; this.showLevelUp(true); }
      }
    }

    this.updateEnemies(dt, isInvincible);
    this.updateBosses(dt, isInvincible);
    this.updateProjectiles(dt, isInvincible);
    this.updateXpGems(dt);
    this.updateParticles(dt);
    this.updateDmgNums(dt);
    this.updateEffects(dt);

    // Camera
    this.cam.x = lerp(this.cam.x, p.x, 0.08);
    this.cam.y = lerp(this.cam.y, p.y, 0.08);
    if(this.screenShake > 0) this.screenShake -= dt;

    this.updateHUD();
  }

  // ---- PLAYER ATTACK ----
  playerAttack() {
    const p = this.player, c = this.char;
    p.atkCd = c.atkRate * this.effects.atkRateMult;
    p.attackAnim = 0.15;
    const dmg = c.atkDmg * this.effects.dmgMult;

    if(c.atkType === 'projectile') {
      const cnt = (c.projCount||1) + this.effects.projCountBonus;
      const sp = (c.projSpeed||7) * this.effects.projSpeedMult;
      for(let i=0;i<cnt;i++) {
        const spread = c.projSpread||0;
        const ang = p.facing + (i-(cnt-1)/2)*spread;
        this.projectiles.push({
          x:p.x+Math.cos(ang)*20, y:p.y+Math.sin(ang)*20,
          vx:Math.cos(ang)*sp, vy:Math.sin(ang)*sp,
          dmg, size:5, color:c.projColor||'#00d4ff',
          life:(c.projRange||500)/sp/60, maxLife:(c.projRange||500)/sp/60,
          pierce:1+this.effects.piercing, bounce:this.effects.bouncy,
          homing:c.projHoming, aoe:c.projAoe, aoeDmg:c.projAoeDmg||0,
          friendly:true, fromPlayer:true
        });
      }
      this.spawnParticles(p.x+Math.cos(p.facing)*20, p.y+Math.sin(p.facing)*20, c.projColor||'#00d4ff', 3, 2);
    }
    else if(c.atkType === 'meleeArc') {
      const range = c.arcRange||70, arc = c.arcAngle||1.2;
      this.enemies.forEach(e => {
        const d = dist(p,e), a = normalizeAngle(angle(p,e) - p.facing);
        if(d < range+e.size && Math.abs(a) < arc) this.damageEnemy(e, dmg, p.x, p.y);
      });
      this.bosses.forEach(b => {
        const d = dist(p,b), a = normalizeAngle(angle(p,b) - p.facing);
        if(d < range+b.size && Math.abs(a) < arc) this.damageBoss(b, dmg, p.x, p.y);
      });
      this.spawnParticles(p.x+Math.cos(p.facing)*40, p.y+Math.sin(p.facing)*40, c.arcColor||'#ff4444', 8, 3);
    }
    else if(c.atkType === 'dashSlash') {
      p.dashVx = Math.cos(p.facing)*(c.dashSpeed||15);
      p.dashVy = Math.sin(p.facing)*(c.dashSpeed||15);
      p.dashTimer = 0.1;
      const ddmg = c.dashDmg||40;
      setTimeout(() => {
        this.enemies.forEach(e => { if(dist(p,e)<(c.dashRange||120)+e.size) this.damageEnemy(e, ddmg, p.x, p.y); });
        this.bosses.forEach(b => { if(dist(p,b)<(c.dashRange||120)+b.size) this.damageBoss(b, ddmg, p.x, p.y); });
        this.spawnParticles(p.x, p.y, c.dashColor||'#ff8800', 12, 4);
      }, 100);
    }
  }

  // ---- SPECIAL ABILITIES ----
  useSpecial() {
    const p = this.player, c = this.char;
    p.specCdTimer = c.specCd;

    switch(c.id) {
      case 'gunner':
        p.turretTimer = 8;
        this.spawnParticles(p.x, p.y, '#00d4ff', 20, 4);
        break;
      case 'swordsman':
        p.shieldWallTimer = 1.5;
        this.spawnParticles(p.x, p.y, '#ff4444', 15, 3);
        break;
      case 'mage':
        this.spawnAoE(this.player.x+Math.cos(p.facing)*200, this.player.y+Math.sin(p.facing)*200, 120, 100, '#cc66ff');
        this.screenShake = 0.5;
        break;
      case 'ninja':
        p.invisibleTimer = 5;
        p.speed *= 1.5;
        setTimeout(() => { p.speed = c.speed * this.effects.speedMult; }, 5000);
        this.spawnParticles(p.x, p.y, '#ff8800', 15, 3);
        break;
      case 'tank':
        p.shieldWallTimer = 5;
        this.effects.speedMult *= 0.5;
        this.effects.dmgMult *= 0.5;
        setTimeout(() => { this.effects.speedMult /= 0.5; this.effects.dmgMult /= 0.5; }, 5000);
        this.spawnParticles(p.x, p.y, '#ffcc00', 25, 5);
        break;
      case 'priest':
        p.hp = Math.min(p.maxHp, p.hp + p.maxHp * 0.4);
        this.spawnParticles(p.x, p.y, '#ffdd44', 25, 5);
        break;
    }
  }

  spawnAoE(x, y, radius, dmg, color) {
    this.enemies.forEach(e => { if(dist({x,y},e)<radius+e.size) this.damageEnemy(e, dmg, x, y); });
    this.bosses.forEach(b => { if(dist({x,y},b)<radius+b.size) this.damageBoss(b, dmg, x, y); });
    for(let i=0;i<30;i++) {
      const a = rand(0,TAU), r = rand(0,radius);
      this.particles.push({ x:x+Math.cos(a)*r, y:y+Math.sin(a)*r, vx:rand(-2,2), vy:rand(-3,-1),
        life:0.8, maxLife:0.8, size:rand(3,6), color });
    }
  }

  // ---- ENEMIES ----
  startWave() {
    this.wave++;
    this.waveActive = true;
    this.waveSpawnQueue = [];

    if(this.wave % 5 === 0) {
      // Boss wave
      const bossIdx = Math.floor(this.wave/5)-1;
      if(bossIdx < BOSS_TYPES.length) {
        this.showBossWarning(BOSS_TYPES[bossIdx].name);
        const a = rand(0,TAU), d = 500;
        this.waveSpawnQueue.push({ type:'boss_'+bossIdx, x:this.player.x+Math.cos(a)*d, y:this.player.y+Math.sin(a)*d });
        this.waveEnemiesLeft = 1;
        // Add minions
        for(let i=0;i<this.wave;i++) {
          const ma = rand(0,TAU), md = rand(300,600);
          this.waveSpawnQueue.push({ type:'grunt', x:this.player.x+Math.cos(ma)*md, y:this.player.y+Math.sin(ma)*md });
          this.waveEnemiesLeft++;
        }
      }
    } else {
      const cnt = 5 + this.wave * 3;
      this.waveEnemiesLeft = cnt;
      const types = ['grunt'];
      if(this.wave >= 2) types.push('scout');
      if(this.wave >= 3) types.push('ranged');
      if(this.wave >= 4) types.push('tank');
      if(this.wave >= 6) types.push('healer');
      for(let i=0;i<cnt;i++) {
        const a = rand(0,TAU), d = rand(400,700);
        this.waveSpawnQueue.push({ type:types[randInt(0,types.length-1)], x:this.player.x+Math.cos(a)*d, y:this.player.y+Math.sin(a)*d });
      }
    }
  }

  spawnEnemy(type, x, y) {
    if(type.startsWith('boss_')) {
      const idx = parseInt(type.split('_')[1]);
      const bt = BOSS_TYPES[idx];
      const hpMult = 1 + this.wave * 0.15;
      const boss = {
        x, y, size:bt.size, color:bt.color, name:bt.name, icon:bt.icon,
        hp:bt.maxHp*hpMult, maxHp:bt.maxHp*hpMult, speed:bt.speed, dmg:bt.dmg*hpMult,
        isBoss:true, bossType:bt.id, frozen:0, stunned:0, phase:1, atkTimer:3,
        attacks:bt.atks||bt.attacks, atkIdx:0
      };
      this.bosses.push(boss);
      return;
    }
    const t = ENEMY_TYPES[type];
    if(!t) return;
    const hpMult = 1 + this.wave * 0.1;
    x = clamp(x, 50, WORLD_W-50);
    y = clamp(y, 50, WORLD_H-50);
    this.enemies.push({
      x, y, type, size:t.size, color:t.color,
      hp:t.hp*hpMult, maxHp:t.hp*hpMult, speed:t.speed, dmg:t.dmg*hpMult,
      xp:t.xp, frozen:0, stunned:0, atkCd:0, shootCd:t.shootCd||0, shootTimer:0,
      healRange:t.healRange||0, healAmt:t.healAmt||0
    });
  }

  updateEnemies(dt, isInvincible) {
    const p = this.player;
    for(let i=this.enemies.length-1;i>=0;i--) {
      const e = this.enemies[i];
      if(e.frozen > 0) { e.frozen -= dt; this.spawnParticles(e.x, e.y, '#00ccff', 1, 1); continue; }
      if(e.stunned > 0) { e.stunned -= dt; continue; }

      // Move toward player
      const d = dist(p, e);
      if(d > e.size + p.size) {
        const a = angle(e, p);
        let sp = e.speed * 60 * dt;
        if(this.effects.blizzard) sp *= 0.85;
        e.x += Math.cos(a)*sp; e.y += Math.sin(a)*sp;
      }
      e.x = clamp(e.x, e.size, WORLD_W-e.size);
      e.y = clamp(e.y, e.size, WORLD_H-e.size);

      // Separation
      for(let j=0;j<this.enemies.length;j++) {
        if(i===j) continue;
        const o = this.enemies[j];
        const dd = dist(e,o), minD = e.size+o.size;
        if(dd < minD && dd > 0) {
          const a = angle(o,e);
          const push = (minD-dd)*0.5;
          e.x += Math.cos(a)*push; e.y += Math.sin(a)*push;
        }
      }

      // Ranged attack
      if(e.shootCd > 0) {
        e.shootTimer -= dt;
        if(e.shootTimer <= 0 && d < 500) {
          e.shootTimer = e.shootCd;
          const a = angle(e, p);
          this.projectiles.push({ x:e.x, y:e.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5,
            dmg:e.dmg*0.5, size:4, color:'#ff6699', life:2, maxLife:2, pierce:0, friendly:false });
        }
      }

      // Healer
      if(e.healRange > 0) {
        this.enemies.forEach(o => {
          if(o!==e && dist(e,o)<e.healRange) o.hp = Math.min(o.maxHp, o.hp + e.healAmt*dt);
        });
      }

      // Damage player
      if(d < e.size + p.size && !isInvincible) {
        this.damagePlayer(e.dmg);
        const pushA = angle(e, p);
        p.x -= Math.cos(pushA)*5; p.y -= Math.sin(pushA)*5;
      }
    }
  }

  updateBosses(dt, isInvincible) {
    const p = this.player;
    for(let i=this.bosses.length-1;i>=0;i--) {
      const b = this.bosses[i];
      if(b.frozen > 0) { b.frozen -= dt; continue; }
      if(b.stunned > 0) { b.stunned -= dt; continue; }

      // Phase check
      if(b.hp < b.maxHp*0.5 && b.phase===1) { b.phase=2; this.screenShake=0.5; this.spawnParticles(b.x,b.y,'#ff3366',20,5); }

      // Move toward player
      const d = dist(p, b);
      if(d > b.size + p.size + 50) {
        const a = angle(b, p);
        b.x += Math.cos(a)*b.speed*60*dt; b.y += Math.sin(a)*b.speed*60*dt;
      }

      // Attack
      b.atkTimer -= dt;
      if(b.atkTimer <= 0) {
        const attacks = b.attacks || ['slam'];
        const atk = attacks[b.atkIdx % attacks.length];
        b.atkIdx++;
        b.atkTimer = b.phase===2 ? 2 : 3;
        this.bossAttack(b, atk);
      }

      // Contact damage
      if(d < b.size + p.size + 10 && !isInvincible) {
        this.damagePlayer(b.dmg * 0.3);
      }
    }
  }

  bossAttack(b, atk) {
    const p = this.player;
    switch(atk) {
      case 'summon':
        for(let i=0;i<3;i++) {
          const a = rand(0,TAU);
          this.spawnEnemy('grunt', b.x+Math.cos(a)*80, b.y+Math.sin(a)*80);
        }
        break;
      case 'slam':
      case 'freeze':
        this.spawnAoE(b.x, b.y, 120, b.dmg, '#ff3366');
        this.screenShake = 0.4;
        if(atk==='freeze') this.enemies.forEach(e=>{ if(dist(b,e)<150) e.frozen=2; });
        break;
      case 'bounce':
        for(let i=0;i<5;i++) {
          const a = rand(0,TAU);
          this.projectiles.push({ x:b.x, y:b.y, vx:Math.cos(a)*4, vy:Math.sin(a)*4,
            dmg:b.dmg*0.5, size:8, color:'#00ff88', life:3, maxLife:3, pierce:0, friendly:false });
        }
        break;
      case 'blizzard':
        for(let i=0;i<8;i++) {
          const a = rand(0,TAU), r = rand(50,200);
          setTimeout(() => this.spawnAoE(p.x+Math.cos(a)*r, p.y+Math.sin(a)*r, 60, b.dmg*0.3, '#00ccff'), i*200);
        }
        break;
      case 'shards':
        for(let i=0;i<8;i++) {
          const a = (TAU/8)*i;
          this.projectiles.push({ x:b.x, y:b.y, vx:Math.cos(a)*6, vy:Math.sin(a)*6,
            dmg:b.dmg*0.4, size:6, color:'#00ccff', life:2, maxLife:2, pierce:0, friendly:false });
        }
        break;
      case 'breath':
        const ba = angle(b,p);
        for(let i=0;i<10;i++) {
          setTimeout(() => {
            for(let j=-2;j<=2;j++) {
              const a = ba+j*0.15;
              this.projectiles.push({ x:b.x, y:b.y, vx:Math.cos(a)*7, vy:Math.sin(a)*7,
                dmg:b.dmg*0.3, size:5, color:'#ff4400', life:1.5, maxLife:1.5, pierce:2, friendly:false });
            }
          }, i*100);
        }
        break;
      case 'fireballs':
        for(let i=0;i<4;i++) {
          const a = angle(b,p)+rand(-0.3,0.3);
          this.projectiles.push({ x:b.x, y:b.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5,
            dmg:b.dmg*0.6, size:10, color:'#ff4400', life:3, maxLife:3, pierce:0, friendly:false });
        }
        break;
      case 'lava':
        for(let i=0;i<6;i++) {
          const a = rand(0,TAU), r = rand(100,300);
          this.projectiles.push({ x:p.x+Math.cos(a)*r, y:p.y+Math.sin(a)*r, vx:0, vy:0,
            dmg:b.dmg*0.2, size:25, color:'#ff4400', life:3, maxLife:3, pierce:999, friendly:false, isLava:true });
        }
        break;
      case 'teleport':
        const ta = rand(0,TAU);
        b.x = p.x+Math.cos(ta)*80; b.y = p.y+Math.sin(ta)*80;
        this.spawnParticles(b.x, b.y, '#9933ff', 15, 4);
        break;
      case 'shuriken':
        for(let i=0;i<12;i++) {
          const a = (TAU/12)*i;
          this.projectiles.push({ x:b.x, y:b.y, vx:Math.cos(a)*5, vy:Math.sin(a)*5,
            dmg:b.dmg*0.3, size:6, color:'#9933ff', life:3, maxLife:3, pierce:3, friendly:false });
        }
        break;
      case 'dash':
        const da = angle(b,p);
        b.x += Math.cos(da)*200; b.y += Math.sin(da)*200;
        this.spawnAoE(b.x, b.y, 80, b.dmg, '#9933ff');
        break;
      case 'shockwave':
        for(let r=50;r<=300;r+=50) {
          setTimeout(() => {
            this.enemies.forEach(()=>{});
            if(dist(p,b)<r+30 && dist(p,b)>r-30) this.damagePlayer(b.dmg*0.5);
            this.spawnParticles(b.x+Math.cos(0)*r, b.y, '#cc66ff', 8, 3);
          }, (r-50)*3);
        }
        break;
      case 'reflect':
        this.projectiles.forEach(proj => {
          if(proj.friendly && dist(proj,b)<100) {
            proj.vx *= -1; proj.vy *= -1; proj.friendly = false; proj.color = '#cc66ff';
          }
        });
        break;
    }
  }

  // ---- PROJECTILES ----
  updateProjectiles(dt, isInvincible) {
    const p = this.player;
    for(let i=this.projectiles.length-1;i>=0;i--) {
      const proj = this.projectiles[i];
      proj.life -= dt;
      if(proj.life <= 0) { this.projectiles.splice(i,1); continue; }

      // Homing
      if(proj.homing && proj.friendly) {
        let closest = null, minD = 300;
        this.enemies.forEach(e => { const d=dist(proj,e); if(d<minD){minD=d;closest=e;} });
        this.bosses.forEach(b => { const d=dist(proj,b); if(d<minD){minD=d;closest=b;} });
        if(closest) {
          const a = angle(proj,closest), curA = Math.atan2(proj.vy,proj.vx);
          const diff = normalizeAngle(a-curA);
          const newA = curA + diff*0.1;
          const sp = Math.hypot(proj.vx,proj.vy);
          proj.vx = Math.cos(newA)*sp; proj.vy = Math.sin(newA)*sp;
        }
      }

      proj.x += proj.vx*60*dt; proj.y += proj.vy*60*dt;

      // Out of world
      if(proj.x<0||proj.x>WORLD_W||proj.y<0||proj.y>WORLD_H) { this.projectiles.splice(i,1); continue; }

      // Trail
      if(proj.friendly && !proj.isFireTrail && !proj.isLava) {
        this.particles.push({ x:proj.x, y:proj.y, vx:0, vy:0, life:0.2, maxLife:0.2, size:2, color:proj.color });
      }

      if(proj.friendly) {
        // Hit enemies
        for(let j=this.enemies.length-1;j>=0;j--) {
          const e = this.enemies[j];
          if(dist(proj,e) < proj.size+e.size) {
            let dmg = proj.dmg;
            // Crit
            if(chance(this.effects.critChance)) { dmg *= 2; this.spawnParticles(proj.x,proj.y,'#ffcc00',6,3); }
            // Frozen bonus
            if(e.frozen>0 && this.effects.freezeDmgMult>1) dmg *= this.effects.freezeDmgMult;
            this.damageEnemy(e, dmg, proj.x, proj.y);
            // AoE
            if(proj.aoe) {
              this.enemies.forEach(o => { if(o!==e && dist(proj,o)<proj.aoe) this.damageEnemy(o, proj.aoeDmg||dmg*0.5, proj.x, proj.y); });
            }
            // Chain lightning
            if(this.effects.chainLightning > 0) {
              let chains = this.effects.chainLightning;
              let lastPos = {x:proj.x, y:proj.y};
              this.enemies.forEach(o => {
                if(chains<=0||o===e) return;
                if(dist(lastPos,o)<150) { this.damageEnemy(o, dmg*0.5, lastPos.x, lastPos.y); lastPos={x:o.x,y:o.y}; chains--; }
              });
            }
            // Thunder stun
            if(this.effects.thunderStrike > 0 && chance(this.effects.thunderStrike)) e.stunned = 1;
            // Ice bullet slow
            if(this.effects.iceBullet) e.frozen = Math.max(e.frozen, 0.5);
            // Fire bullet burn
            if(this.effects.fireBullet) e.burning = 3;
            proj.pierce--;
            if(proj.pierce <= 0 && proj.bounce <= 0) { this.projectiles.splice(i,1); break; }
            if(proj.bounce > 0) { proj.bounce--; proj.vx*=-1; proj.vy*=-1; }
          }
        }
        // Hit bosses
        for(let j=this.bosses.length-1;j>=0;j--) {
          const b = this.bosses[j];
          if(dist(proj,b) < proj.size+b.size) {
            let dmg = proj.dmg;
            if(chance(this.effects.critChance)) { dmg *= 2; this.spawnParticles(proj.x,proj.y,'#ffcc00',6,3); }
            if(b.frozen>0 && this.effects.freezeDmgMult>1) dmg *= this.effects.freezeDmgMult;
            this.damageBoss(b, dmg, proj.x, proj.y);
            if(proj.aoe) {
              this.enemies.forEach(o => { if(dist(proj,o)<proj.aoe) this.damageEnemy(o, proj.aoeDmg||dmg*0.5, proj.x, proj.y); });
            }
            proj.pierce--;
            if(proj.pierce <= 0 && proj.bounce <= 0) { this.projectiles.splice(i,1); break; }
            if(proj.bounce > 0) { proj.bounce--; proj.vx*=-1; proj.vy*=-1; }
          }
        }
      } else {
        // Enemy projectile hits player
        if(!isInvincible && dist(proj,p) < proj.size+p.size) {
          this.damagePlayer(proj.dmg);
          this.projectiles.splice(i,1);
        }
      }
    }
  }

  // ---- DAMAGE ----
  damageEnemy(e, dmg, ox, oy) {
    e.hp -= dmg;
    this.totalDmg += dmg;
    this.dmgNums.push({ x:e.x+rand(-10,10), y:e.y-e.size-10, text:Math.floor(dmg).toString(), life:0.8, maxLife:0.8, color:dmg>=30?'#ffcc00':'#fff' });
    this.spawnParticles(e.x, e.y, e.color, 3, 2);
    // Knockback
    const a = angle({x:ox,y:oy}, e);
    e.x += Math.cos(a)*3; e.y += Math.sin(a)*3;
    if(e.hp <= 0) this.killEnemy(e);
  }

  damageBoss(b, dmg, ox, oy) {
    b.hp -= dmg;
    this.totalDmg += dmg;
    this.dmgNums.push({ x:b.x+rand(-20,20), y:b.y-b.size-10, text:Math.floor(dmg).toString(), life:0.8, maxLife:0.8, color:'#ffcc00' });
    this.spawnParticles(b.x, b.y, b.color, 5, 3);
    if(b.hp <= 0) this.killBoss(b);
  }

  damagePlayer(dmg) {
    const p = this.player;
    if(this.effects.dodgeChance > 0 && chance(this.effects.dodgeChance)) {
      this.dmgNums.push({ x:p.x, y:p.y-30, text:'闪避', life:0.6, maxLife:0.6, color:'#00ccff' });
      return;
    }
    let actualDmg = dmg * (1 - this.effects.iceArmor);
    if(p.shieldWallTimer > 0) actualDmg *= 0.5;
    if(p.tank && this.char.id==='tank') actualDmg *= 0.8;
    if(p.shield > 0) { const absorbed=Math.min(p.shield,actualDmg); p.shield-=absorbed; actualDmg-=absorbed; }
    p.hp -= actualDmg;
    this.spawnParticles(p.x, p.y, '#ff3366', 5, 3);
    this.screenShake = Math.max(this.screenShake, 0.15);
    if(p.hp <= 0) {
      if(this.effects.resurrection) {
        p.hp = p.maxHp * 0.5; this.effects.resurrection = false;
        this.spawnParticles(p.x, p.y, '#ffdd44', 30, 5);
      } else {
        this.endGame();
      }
    }
  }

  killEnemy(e) {
    this.enemies = this.enemies.filter(en => en !== e);
    this.waveEnemiesLeft--;
    this.killCount++;
    // XP gem
    const xpGain = e.xp * this.effects.xpMult;
    this.xpGems.push({ x:e.x, y:e.y, xp:xpGain, size:6, life:10 });
    // Heal on kill
    if(this.effects.healOnKill > 0) this.player.hp = Math.min(this.player.maxHp, this.player.hp + this.player.maxHp*this.effects.healOnKill);
    // Particles
    this.spawnParticles(e.x, e.y, e.color, 12, 4);
    this.spawnParticles(e.x, e.y, '#fff', 5, 2);
  }

  killBoss(b) {
    this.bosses = this.bosses.filter(bb => bb !== b);
    this.waveEnemiesLeft--;
    this.killCount++;
    this.bossRewardPending = true;
    // Big explosion
    this.spawnParticles(b.x, b.y, b.color, 40, 6);
    this.spawnParticles(b.x, b.y, '#fff', 20, 4);
    this.screenShake = 0.8;
    // Drop lots of XP
    for(let i=0;i<10;i++) {
      const a = rand(0,TAU), r = rand(0,50);
      this.xpGems.push({ x:b.x+Math.cos(a)*r, y:b.y+Math.sin(a)*r, xp:20*this.effects.xpMult, size:8, life:15 });
    }
  }

  // ---- XP & LEVEL UP ----
  updateXpGems(dt) {
    const p = this.player;
    for(let i=this.xpGems.length-1;i>=0;i--) {
      const g = this.xpGems[i];
      g.life -= dt;
      if(g.life <= 0) { this.xpGems.splice(i,1); continue; }
      const d = dist(p, g);
      if(d < 100) { // Attract
        const a = angle(g, p);
        g.x += Math.cos(a)*8*60*dt; g.y += Math.sin(a)*8*60*dt;
      }
      if(d < p.size + g.size) {
        p.xp += g.xp;
        this.xpGems.splice(i,1);
        this.spawnParticles(p.x, p.y, '#00d4ff', 5, 2);
        while(p.xp >= p.xpNeeded && p.level < MAX_LEVEL) {
          p.xp -= p.xpNeeded;
          p.level++;
          p.xpNeeded = xpFor(p.level);
          p.maxHp += 5; p.hp = Math.min(p.maxHp, p.hp + 10);
          this.showLevelUp(false);
        }
      }
    }
  }

  showLevelUp(isBoss) {
    this.running = false;
    document.getElementById('level-up').classList.add('show');
    document.getElementById('lu-title').textContent = isBoss ? 'BOSS 已击败！' : '升级！';
    document.getElementById('lu-sub').textContent = isBoss ? '选择一个特殊奖励' : `等级 ${this.player.level} — 选择一个奖励`;
    const container = document.getElementById('lu-rewards');
    container.innerHTML = '';
    const numChoices = isBoss ? 3 : 3;
    const avail = this.getAvailableRewards(isBoss);
    for(let i=0;i<numChoices && avail.length>0;i++) {
      const ri = randInt(0, avail.length-1);
      const r = avail.splice(ri,1)[0];
      const card = document.createElement('div');
      card.className = `reward-card r-${r.rarity}`;
      card.innerHTML = `<div class="r-icon">${r.icon}</div><div class="r-name">${r.name}</div>
        <div class="r-trait" style="background:${TRAIT_COLORS[r.trait]}33;color:${TRAIT_COLORS[r.trait]}">${TRAIT_NAMES[r.trait]}</div>
        <div class="r-desc">${r.desc}</div><div class="r-rarity" style="color:${r.rarity==='epic'?'#cc66ff':r.rarity==='rare'?'#00d4ff':r.rarity==='uncommon'?'#00ff88':'#888'}">${r.rarity==='epic'?'史诗':r.rarity==='rare'?'稀有':r.rarity==='uncommon'?'精良':'普通'}</div>`;
      card.onclick = () => this.selectReward(r);
      container.appendChild(card);
    }
  }

  getAvailableRewards(isBoss) {
    const owned = new Set(this.rewardList.map(r=>r.id));
    let pool = REWARDS.filter(r => !owned.has(r.id));
    if(isBoss) pool = pool.filter(r => r.rarity==='rare'||r.rarity==='epic');
    if(pool.length===0) pool = REWARDS; // fallback
    return [...pool];
  }

  selectReward(r) {
    this.rewardList.push(r);
    r.apply(this);
    this.traitPts[r.trait] += r.traitPts;
    this.checkTraitSynergies();
    document.getElementById('level-up').classList.remove('show');
    if(this.effects.shadowBurst) {
      this.spawnAoE(this.player.x, this.player.y, 150, 100, '#9933ff');
    }
    this.running = true;
    this.lastTime = performance.now();
    requestAnimationFrame(ts => this.loop(ts));
  }

  checkTraitSynergies() {
    this.traitActive = {};
    for(const [trait, pts] of Object.entries(this.traitPts)) {
      for(let t=TRAIT_TIERS.length-1;t>=0;t--) {
        if(pts >= TRAIT_TIERS[t].count) {
          this.traitActive[trait] = t+1;
          this.applyTraitTier(trait, t+1);
          break;
        }
      }
    }
    this.updateTraitUI();
  }

  applyTraitTier(trait, tier) {
    switch(trait) {
      case 'fire': this.effects.dmgMult += tier*0.1; break;
      case 'ice': break; // Freeze chance handled via effects
      case 'lightning': break; // Chain count handled via effects
      case 'shadow': this.effects.critChance += tier*0.05; break;
      case 'holy': this.effects.regenRate += tier*0.5; break;
    }
  }

  updateTraitUI() {
    const container = document.getElementById('traits');
    container.innerHTML = '';
    for(const [trait, tier] of Object.entries(this.traitActive)) {
      const badge = document.createElement('div');
      badge.className = 'trait-badge';
      badge.style.background = `${TRAIT_COLORS[trait]}33`;
      badge.style.color = TRAIT_COLORS[trait];
      badge.style.border = `1px solid ${TRAIT_COLORS[trait]}`;
      badge.textContent = `${TRAIT_NAMES[trait]} ${tier}阶 (${this.traitPts[trait]}点)`;
      container.appendChild(badge);
    }
  }

  // ---- PARTICLES ----
  spawnParticles(x, y, color, count, speed) {
    for(let i=0;i<count;i++) {
      const a = rand(0,TAU), s = rand(0.5,speed);
      this.particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:rand(0.3,0.8), maxLife:0.8, size:rand(2,5), color });
    }
  }

  updateParticles(dt) {
    for(let i=this.particles.length-1;i>=0;i--) {
      const p = this.particles[i];
      p.x += p.vx*60*dt; p.y += p.vy*60*dt;
      p.life -= dt;
      if(p.life <= 0) this.particles.splice(i,1);
    }
  }

  updateDmgNums(dt) {
    for(let i=this.dmgNums.length-1;i>=0;i--) {
      const d = this.dmgNums[i];
      d.y -= 40*dt; d.life -= dt;
      if(d.life <= 0) this.dmgNums.splice(i,1);
    }
  }

  updateEffects(dt) {
    // Burn damage
    this.enemies.forEach(e => {
      if(e.burning > 0) {
        e.burning -= dt;
        const burnDmg = 5 * dt * (this.effects.fireDmgMult||1);
        e.hp -= burnDmg;
        if(e.hp <= 0) this.killEnemy(e);
        if(chance(0.1)) this.spawnParticles(e.x, e.y, '#ff4400', 1, 1);
      }
    });
    this.bosses.forEach(b => {
      if(b.burning > 0) {
        b.burning -= dt;
        b.hp -= 5 * dt * (this.effects.fireDmgMult||1);
        if(b.hp <= 0) this.killBoss(b);
      }
    });
    // Dark pact
    if(this.effects.darkPact) {
      const hpRatio = this.player.hp / this.player.maxHp;
      this.effects.dmgMult = (1 + (1-hpRatio)*0.5);
    }
  }

  // ---- UI ----
  showBossWarning(name) {
    const el = document.getElementById('boss-warn');
    document.getElementById('boss-warn').querySelector('h2').textContent = `警告：${name} 来袭`;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2000);
  }

  updateHUD() {
    const p = this.player, c = this.char;
    document.getElementById('hud-level').textContent = `Lv ${p.level} — ${c.name}`;
    document.getElementById('hp-bar').style.width = `${(p.hp/p.maxHp)*100}%`;
    document.getElementById('hp-text').textContent = `${Math.ceil(p.hp)}/${p.maxHp}${p.shield>0?' +'+Math.ceil(p.shield)+'🛡':''}`;
    document.getElementById('xp-bar').style.width = `${(p.xp/p.xpNeeded)*100}%`;
    document.getElementById('xp-text').textContent = `${Math.floor(p.xp)}/${p.xpNeeded}`;
    document.getElementById('wave-text').textContent = `第 ${this.wave} 波`;
    document.getElementById('wave-sub').textContent = this.waveActive ? `敌人: ${this.enemies.length + this.bosses.length}` : `下一波: ${Math.ceil(this.waveTimer)}秒`;
    const cd = p.specCdTimer > 0 ? `特殊技能: ${p.specCdTimer.toFixed(1)}秒` : '特殊技能: 就绪';
    document.getElementById('cd-text').textContent = cd;

    // Boss HP
    if(this.bosses.length > 0) {
      const b = this.bosses[0];
      document.getElementById('boss-hp').classList.add('show');
      document.getElementById('boss-name').textContent = `${b.icon} ${b.name}`;
      document.getElementById('boss-bar').style.width = `${(b.hp/b.maxHp)*100}%`;
      document.getElementById('boss-text').textContent = `${Math.ceil(b.hp)}/${b.maxHp}`;
    } else {
      document.getElementById('boss-hp').classList.remove('show');
    }
  }

  endGame() {
    this.gameOver = true;
    document.getElementById('game-over').classList.add('show');
    document.getElementById('go-stats').innerHTML = `
      波次: ${this.wave}<br>
      等级: ${this.player.level}<br>
      击杀: ${this.killCount}<br>
      总伤害: ${Math.floor(this.totalDmg)}<br>
      收集奖励: ${this.rewardList.length}
    `;
    document.getElementById('go-btn').onclick = () => location.reload();
  }

  // ---- RENDER ----
  render() {
    const ctx = this.ctx, p = this.player;
    ctx.clearRect(0, 0, this.W, this.H);

    // Screen shake
    let sx=0, sy=0;
    if(this.screenShake > 0) { sx=rand(-3,3)*this.screenShake*3; sy=rand(-3,3)*this.screenShake*3; }
    ctx.save();
    ctx.translate(this.W/2 - this.cam.x + sx, this.H/2 - this.cam.y + sy);

    // Background grid
    ctx.strokeStyle = 'rgba(40,40,80,0.3)';
    ctx.lineWidth = 1;
    const gs = 80;
    const startX = Math.floor((this.cam.x-this.W/2)/gs)*gs;
    const startY = Math.floor((this.cam.y-this.H/2)/gs)*gs;
    for(let x=startX;x<this.cam.x+this.W/2+gs;x+=gs) { ctx.beginPath(); ctx.moveTo(x,startY); ctx.lineTo(x,this.cam.y+this.H/2+gs); ctx.stroke(); }
    for(let y=startY;y<this.cam.y+this.H/2+gs;y+=gs) { ctx.beginPath(); ctx.moveTo(startX,y); ctx.lineTo(this.cam.x+this.W/2+gs,y); ctx.stroke(); }

    // World border
    ctx.strokeStyle = '#ff3366';
    ctx.lineWidth = 3;
    ctx.strokeRect(0,0,WORLD_W,WORLD_H);

    // XP gems
    this.xpGems.forEach(g => {
      const alpha = Math.min(1, g.life);
      ctx.save(); ctx.globalAlpha = alpha;
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(g.x, g.y, g.size, 0, TAU); ctx.fill();
      ctx.restore();
    });

    // Projectiles
    this.projectiles.forEach(proj => {
      ctx.save();
      ctx.fillStyle = proj.color;
      ctx.shadowColor = proj.color; ctx.shadowBlur = 8;
      ctx.beginPath(); ctx.arc(proj.x, proj.y, proj.size, 0, TAU); ctx.fill();
      ctx.restore();
    });

    // Particles
    this.particles.forEach(pt => {
      ctx.save(); ctx.globalAlpha = pt.life/pt.maxLife;
      ctx.fillStyle = pt.color;
      ctx.beginPath(); ctx.arc(pt.x, pt.y, pt.size*(pt.life/pt.maxLife), 0, TAU); ctx.fill();
      ctx.restore();
    });

    // Enemies
    this.enemies.forEach(e => {
      ctx.save();
      // Frozen effect
      if(e.frozen > 0) { ctx.fillStyle = '#88ddff'; ctx.globalAlpha = 0.8; }
      else { ctx.fillStyle = e.color; }
      ctx.shadowColor = e.color; ctx.shadowBlur = 6;
      ctx.beginPath(); ctx.arc(e.x, e.y, e.size, 0, TAU); ctx.fill();
      // Burning
      if(e.burning > 0) {
        ctx.strokeStyle = '#ff4400'; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(e.x, e.y, e.size+4, 0, TAU); ctx.stroke();
      }
      // HP bar
      if(e.hp < e.maxHp) {
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.fillRect(e.x-e.size, e.y-e.size-8, e.size*2, 4);
        ctx.fillStyle = e.hp/e.maxHp>0.5?'#00ff88':e.hp/e.maxHp>0.25?'#ffcc00':'#ff3366';
        ctx.fillRect(e.x-e.size, e.y-e.size-8, e.size*2*(e.hp/e.maxHp), 4);
      }
      ctx.restore();
    });

    // Bosses
    this.bosses.forEach(b => {
      ctx.save();
      ctx.fillStyle = b.color;
      ctx.shadowColor = b.color; ctx.shadowBlur = 15;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.size, 0, TAU); ctx.fill();
      // Inner glow
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath(); ctx.arc(b.x-b.size*0.2, b.y-b.size*0.2, b.size*0.5, 0, TAU); ctx.fill();
      // Icon
      ctx.font = `${b.size}px sans-serif`;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(b.icon, b.x, b.y);
      ctx.restore();
    });

    // Player
    if(!this.player.invisible || Math.floor(this.time*10)%2===0) {
      ctx.save();
      // Shield wall glow
      if(this.player.shieldWallTimer > 0) {
        ctx.strokeStyle = '#ffcc00'; ctx.lineWidth = 3;
        ctx.shadowColor = '#ffcc00'; ctx.shadowBlur = 15;
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size+10, 0, TAU); ctx.stroke();
      }
      // Dodge trail
      if(this.player.dodgeTimer > 0) {
        ctx.globalAlpha = 0.5;
        ctx.fillStyle = '#00d4ff';
        ctx.beginPath(); ctx.arc(p.x-p.dashVx*3, p.y-p.dashVy*3, p.size, 0, TAU); ctx.fill();
      }
      // Body
      ctx.globalAlpha = this.player.invisible ? 0.4 : 1;
      ctx.fillStyle = '#00d4ff';
      ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 12;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, TAU); ctx.fill();
      // Inner
      ctx.fillStyle = '#fff';
      ctx.shadowBlur = 0;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.size*0.4, 0, TAU); ctx.fill();
      // Attack animation
      if(this.player.attackAnim > 0) {
        ctx.strokeStyle = this.char.projColor||this.char.arcColor||'#fff';
        ctx.lineWidth = 3; ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 10;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 25, p.facing-0.5, p.facing+0.5);
        ctx.stroke();
      }
      // Facing direction
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x+Math.cos(p.facing)*30, p.y+Math.sin(p.facing)*30);
      ctx.stroke();
      ctx.restore();
    }

    // Orbit shields
    if(this.effects.orbitShield > 0) {
      for(let i=0;i<this.effects.orbitShield;i++) {
        const a = this.t.orbit + (TAU/this.effects.orbitShield)*i;
        const ox = p.x+Math.cos(a)*60, oy = p.y+Math.sin(a)*60;
        ctx.save();
        ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 8;
        ctx.beginPath(); ctx.arc(ox, oy, 8, 0, TAU); ctx.fill();
        ctx.restore();
      }
    }

    // Turret
    if(this.player.turretTimer > 0) {
      const tx = p.x+Math.cos(p.facing)*40, ty = p.y+Math.sin(p.facing)*40;
      ctx.save(); ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; ctx.shadowBlur = 10;
      ctx.fillRect(tx-8, ty-8, 16, 16); ctx.restore();
    }

    // Damage numbers
    this.dmgNums.forEach(d => {
      ctx.save(); ctx.globalAlpha = d.life/d.maxLife;
      ctx.fillStyle = d.color; ctx.font = 'bold 14px sans-serif';
      ctx.textAlign = 'center'; ctx.fillText(d.text, d.x, d.y); ctx.restore();
    });

    // Off-screen enemy indicators
    const margin = 30;
    this.enemies.forEach(e => {
      const sx = e.x - this.cam.x + this.W/2;
      const sy = e.y - this.cam.y + this.H/2;
      if(sx<margin||sx>this.W-margin||sy<margin||sy>this.H-margin) {
        const ix = clamp(sx, margin, this.W-margin);
        const iy = clamp(sy, margin, this.H-margin);
        ctx.save(); ctx.fillStyle = e.color; ctx.globalAlpha = 0.6;
        ctx.beginPath(); ctx.arc(ix, iy, 4, 0, TAU); ctx.fill(); ctx.restore();
      }
    });

    ctx.restore();

    // Minimap
    this.renderMinimap();
  }

  renderMinimap() {
    const ctx = this.ctx;
    const mw=140, mh=140, mx=this.W-mw-12, my=this.H-mh-12;
    const scale = mw/WORLD_W;
    ctx.save();
    ctx.fillStyle = 'rgba(0,0,20,0.7)';
    ctx.strokeStyle = 'rgba(100,100,255,0.3)'; ctx.lineWidth = 1;
    ctx.fillRect(mx,my,mw,mh); ctx.strokeRect(mx,my,mw,mh);
    // Player
    ctx.fillStyle = '#00d4ff';
    ctx.fillRect(mx+this.player.x*scale-2, my+this.player.y*scale-2, 4, 4);
    // Enemies
    this.enemies.forEach(e => {
      ctx.fillStyle = '#ff3366';
      ctx.fillRect(mx+e.x*scale-1, my+e.y*scale-1, 2, 2);
    });
    this.bosses.forEach(b => {
      ctx.fillStyle = '#ff0000';
      ctx.fillRect(mx+b.x*scale-3, my+b.y*scale-3, 6, 6);
    });
    ctx.restore();
  }
}

// ============================================================
// CHARACTER SELECT
// ============================================================
function showCharSelect() {
  const container = document.getElementById('char-cards');
  container.innerHTML = '';
  CHARS.forEach(c => {
    const card = document.createElement('div');
    card.className = 'char-card';
    const diffStars = '★'.repeat(c.diff) + '☆'.repeat(3-c.diff);
    card.innerHTML = `
      <div class="icon">${c.icon}</div>
      <div class="name">${c.name}</div>
      <div class="type">${c.type}</div>
      <div class="stats">
        <div><span class="label">生命</span><span>${c.maxHp}</span></div>
        <div><span class="label">速度</span><span>${c.speed}</span></div>
        <div><span class="label">攻击</span><span>${c.atkDmg}</span></div>
      </div>
      <div class="atk">${c.spec}</div>
      <div class="diff">难度: ${diffStars}</div>
    `;
    card.onclick = () => {
      const game = new Game();
      game.init(c.id);
      game.start();
    };
    container.appendChild(card);
  });
}

// ============================================================
// INIT
// ============================================================
showCharSelect();
</script>
