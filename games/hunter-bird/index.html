<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>猎人与鸟蛋 - Hunter and the Bird</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; }
canvas { display: block; image-rendering: pixelated; cursor: crosshair; }
#ui-overlay {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; z-index: 10;
}
#start-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  background: linear-gradient(180deg, #1a0a2e 0%, #16213e 50%, #0f3460 100%);
  z-index: 20; cursor: pointer;
}
#start-screen h1 {
  font-size: 64px; color: #e94560; text-shadow: 0 0 30px #e94560, 0 0 60px #e94560;
  margin-bottom: 20px; animation: pulse 2s infinite;
}
#start-screen h2 {
  font-size: 28px; color: #ffd700; margin-bottom: 40px;
}
#start-screen .start-btn {
  font-size: 24px; color: #fff; background: #e94560;
  padding: 15px 60px; border-radius: 8px; animation: blink 1.5s infinite;
  pointer-events: auto; cursor: pointer;
}
#start-screen .story-text {
  max-width: 700px; text-align: center; color: #a8d8ea; font-size: 18px;
  line-height: 1.8; margin-bottom: 30px; padding: 0 20px;
}
@keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.05); } }
@keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
#death-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; justify-content: center; align-items: center;
  background: rgba(139,0,0,0.85); z-index: 20; cursor: pointer;
}
#death-screen h1 { font-size: 60px; color: #000; margin-bottom: 20px; }
#death-screen p { font-size: 24px; color: #ff6666; }
#win-screen {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  display: none; flex-direction: column; justify-content: center; align-items: center;
  background: rgba(0,100,0,0.85); z-index: 20; cursor: pointer;
}
#win-screen h1 { font-size: 60px; color: #ffd700; margin-bottom: 20px; }
#win-screen p { font-size: 24px; color: #fff; margin-bottom: 10px; }
</style>
</head>
<body>
<!-- 返回游戏大厅 -->
<style>.gm-back{position:fixed;top:12px;left:12px;z-index:99999;padding:8px 14px;background:rgba(0,0,0,0.6);color:#fff!important;border-radius:8px;text-decoration:none!important;font-size:13px;font-family:sans-serif;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.1);opacity:0.4;transition:opacity 0.3s}.gm-back:hover{opacity:1}</style>
<a href="../../GameMain/index.html" class="gm-back">← 返回游戏大厅</a>

<canvas id="game"></canvas>

<div id="start-screen">
  <h1>🔫 猎人与鸟蛋</h1>
  <h2>Hunter and the Bird</h2>
  <div class="story-text">
    你是一名经验丰富的猎人，在一次深林狩猎中，你发现了一枚奇异的鸟蛋。<br>
    你将它带回了家，却不知这枚蛋中孵化出的，将是你此生最危险的对手……
  </div>
  <div class="start-btn" onclick="startGame()">▶ 开始游戏</div>
</div>

<div id="death-screen">
  <h1>💀 你死了</h1>
  <p>猛禽的利爪撕裂了你的身体……</p>
  <p style="margin-top:30px; animation: blink 1.5s infinite;">点击重新开始</p>
</div>

<div id="win-screen">
  <h1>🏆 胜利！</h1>
  <p>你成功击杀了黑化猛禽！</p>
  <p>猎人的传说将在森林中永远流传……</p>
  <p style="margin-top:30px; animation: blink 1.5s infinite;">点击重新开始</p>
</div>

<script>
// ============================================================
//  GAME ENGINE
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 1200, H = 700;
canvas.width = W; canvas.height = H;

// State
let gameState = 'start'; // start, intro, hunting, foundEgg, hatchScene, bossFight, darkMode, victory, death
let frame = 0;
let timer = 0;
let cutscenePhase = 0;
let cutsceneTimer = 0;
let cutsceneText = '';
let cutsceneTextTimer = 0;

// Hunter
let hunter = { x: 200, y: 480, w: 50, h: 70, hp: 100, maxHp: 100, facing: 1, reloading: false, reloadTimer: 0, invincible: 0 };

// Bird Boss
let bird = { x: 800, y: 300, w: 60, h: 50, hp: 150, maxHp: 150, phase: 'treeJump', targetTree: 0, jumpTimer: 0, darkMode: false, darkTimer: 0, peckX: 0, peckY: 0, pecking: false, peckTimer: 0, flashTimer: 0, velocityY: 0, onGround: false };

// Bullets
let bullets = [];
let particles = [];
let feathers = [];
let screenShake = 0;
let eggCrack = 0;
let eggBounce = 0;

// Trees
let trees = [
  { x: 300, y: 250 },
  { x: 600, y: 200 },
  { x: 900, y: 250 },
  { x: 500, y: 180 },
  { x: 750, y: 220 }
];

// Stars for background
let stars = [];
for (let i = 0; i < 80; i++) stars.push({ x: Math.random() * W, y: Math.random() * 300, s: Math.random() * 2 + 0.5, b: Math.random() });

// Input
let keys = {};
let mouseX = 0, mouseY = 0, mouseDown = false;
let spacePressed = false;

document.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;

  // 空格键强制推进剧情
  if (e.key === ' ' || e.code === 'Space') {
    e.preventDefault();
    if (!spacePressed) {
      spacePressed = true;
      advanceStory();
    }
  }
});

document.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === ' ' || e.code === 'Space') {
    spacePressed = false;
  }
});

canvas.addEventListener('mousemove', e => {
  const r = canvas.getBoundingClientRect();
  mouseX = (e.clientX - r.left) * (W / r.width);
  mouseY = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('mousedown', e => {
  mouseDown = true;
  if (gameState === 'bossFight' || gameState === 'darkMode') shoot();
});
canvas.addEventListener('mouseup', () => mouseDown = false);

// ============================================================
//  强制推进剧情
// ============================================================
function advanceStory() {
  switch (gameState) {
    case 'hunting':
      // 跳过打猎，直接发现鸟蛋
      huntingScene.walkTimer = 280;
      huntingScene.hunterX = 600;
      huntingScene.foundEgg = true;
      cutsceneQueue = [];
      currentCutscene = null;
      gameState = 'foundEgg';
      timer = 0;
      break;

    case 'foundEgg':
      // 跳过回家，直接到孵化场景
      gameState = 'hatchScene';
      timer = 0;
      break;

    case 'hatchScene':
      // 跳过孵化动画，直接开始Boss战
      gameState = 'bossFight';
      timer = 0;
      bird.x = 600;
      bird.y = 200;
      bird.hp = bird.maxHp;
      bird.phase = 'treeJump';
      bird.jumpTimer = 0;
      bird.targetTree = 0;
      bird.darkMode = false;
      hunter.hp = hunter.maxHp;
      hunter.x = 200;
      break;

    case 'darkMode':
      // 跳过黑化动画
      bird.darkTimer = 120;
      gameState = 'bossFight';
      break;

    case 'bossFight':
      // 战斗中按空格：跳过当前Boss阶段
      if (!bird.darkMode && bird.hp > bird.maxHp * 0.5) {
        // 直接进入黑化模式
        bird.hp = bird.maxHp * 0.5;
      }
      break;
  }

  // 跳过当前对话
  if (currentCutscene) {
    cutsceneQueue = [];
    currentCutscene = null;
    cutsceneCallback = null;
  }
}

// Death / Win screens
document.getElementById('death-screen').addEventListener('click', () => { resetGame(); document.getElementById('death-screen').style.display = 'none'; });
document.getElementById('win-screen').addEventListener('click', () => { resetGame(); document.getElementById('win-screen').style.display = 'none'; });

// ============================================================
//  DRAWING HELPERS
// ============================================================
function drawSky(nightAmount) {
  let grad = ctx.createLinearGradient(0, 0, 0, 500);
  let r1 = Math.floor(20 + nightAmount * 10), g1 = Math.floor(10 + nightAmount * 5), b1 = Math.floor(60 - nightAmount * 30);
  let r2 = Math.floor(40 + nightAmount * 20), g2 = Math.floor(80 - nightAmount * 40), b2 = Math.floor(120 - nightAmount * 80);
  grad.addColorStop(0, `rgb(${r1},${g1},${b1})`);
  grad.addColorStop(1, `rgb(${r2},${g2},${b2})`);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  if (nightAmount > 0.3) {
    stars.forEach(s => {
      let a = (nightAmount - 0.3) * 1.4 * (0.5 + 0.5 * Math.sin(frame * 0.02 + s.b * 10));
      ctx.globalAlpha = a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.s, 0, Math.PI * 2);
      ctx.fill();
    });
    ctx.globalAlpha = 1;
  }
}

function drawGround() {
  ctx.fillStyle = '#2d5a27';
  ctx.fillRect(0, 550, W, 150);
  ctx.fillStyle = '#3a7a32';
  ctx.fillRect(0, 545, W, 10);
  // Grass blades
  for (let i = 0; i < W; i += 8) {
    let h = 5 + Math.sin(i * 0.3 + frame * 0.02) * 3;
    ctx.fillStyle = `hsl(${110 + Math.sin(i) * 20}, 60%, ${25 + Math.sin(i * 0.5) * 10}%)`;
    ctx.fillRect(i, 540 - h, 3, h + 5);
  }
}

function drawHouse() {
  // Wall
  ctx.fillStyle = '#8B6914';
  ctx.fillRect(100, 380, 200, 170);
  ctx.fillStyle = '#725810';
  ctx.fillRect(100, 380, 200, 5);
  // Roof
  ctx.fillStyle = '#5a3a1a';
  ctx.beginPath();
  ctx.moveTo(80, 385);
  ctx.lineTo(200, 290);
  ctx.lineTo(320, 385);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a2510';
  ctx.lineWidth = 3;
  ctx.stroke();
  // Door
  ctx.fillStyle = '#4a2a0a';
  ctx.fillRect(175, 450, 50, 100);
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(215, 500, 4, 0, Math.PI * 2);
  ctx.fill();
  // Windows
  ctx.fillStyle = '#ffee88';
  ctx.fillRect(120, 420, 35, 30);
  ctx.fillRect(245, 420, 35, 30);
  ctx.strokeStyle = '#4a2a0a';
  ctx.lineWidth = 2;
  ctx.strokeRect(120, 420, 35, 30);
  ctx.strokeRect(245, 420, 35, 30);
  // Window cross
  ctx.beginPath();
  ctx.moveTo(137.5, 420); ctx.lineTo(137.5, 450);
  ctx.moveTo(120, 435); ctx.lineTo(155, 435);
  ctx.moveTo(262.5, 420); ctx.lineTo(262.5, 450);
  ctx.moveTo(245, 435); ctx.lineTo(280, 435);
  ctx.stroke();
  // Chimney
  ctx.fillStyle = '#6a4a2a';
  ctx.fillRect(250, 300, 25, 85);
}

function drawTree(x, y, dark) {
  // Trunk
  ctx.fillStyle = dark ? '#2a1a0a' : '#5a3a1a';
  ctx.fillRect(x - 12, y, 24, 350 - y);
  // Branches
  ctx.strokeStyle = dark ? '#2a1a0a' : '#5a3a1a';
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(x, y + 20); ctx.lineTo(x - 40, y - 10);
  ctx.moveTo(x, y + 20); ctx.lineTo(x + 45, y - 5);
  ctx.moveTo(x, y + 60); ctx.lineTo(x - 35, y + 30);
  ctx.moveTo(x, y + 60); ctx.lineTo(x + 40, y + 35);
  ctx.stroke();
  // Leaves
  let leafColor = dark ? '#1a3a1a' : '#2a8a2a';
  ctx.fillStyle = leafColor;
  [[x, y - 20, 50], [x - 35, y, 35], [x + 40, y + 5, 38], [x, y + 30, 45]].forEach(([lx, ly, r]) => {
    ctx.beginPath();
    ctx.arc(lx, ly, r, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.fillStyle = dark ? '#0a2a0a' : '#1a6a1a';
  [[x + 10, y - 10, 30], [x - 25, y + 10, 25], [x + 30, y + 15, 28]].forEach(([lx, ly, r]) => {
    ctx.beginPath();
    ctx.arc(lx, ly, r, 0, Math.PI * 2);
    ctx.fill();
  });
}

function drawHunter(x, y, facing, reloading) {
  ctx.save();
  ctx.translate(x, y);
  if (facing < 0) ctx.scale(-1, 1);

  // Body
  ctx.fillStyle = '#4a7a2a';
  ctx.fillRect(-15, -30, 30, 45);
  // Belt
  ctx.fillStyle = '#3a2a1a';
  ctx.fillRect(-16, -5, 32, 6);
  // Head
  ctx.fillStyle = '#d4a574';
  ctx.beginPath();
  ctx.arc(0, -40, 14, 0, Math.PI * 2);
  ctx.fill();
  // Hat
  ctx.fillStyle = '#5a3a1a';
  ctx.fillRect(-18, -55, 36, 8);
  ctx.fillRect(-12, -65, 24, 12);
  // Eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(4, -43, 4, 4);
  // Legs
  ctx.fillStyle = '#3a3a2a';
  ctx.fillRect(-12, 15, 10, 25);
  ctx.fillRect(2, 15, 10, 25);
  // Boots
  ctx.fillStyle = '#2a1a0a';
  ctx.fillRect(-14, 36, 14, 8);
  ctx.fillRect(0, 36, 14, 8);
  // Gun
  if (reloading) {
    ctx.fillStyle = '#555';
    ctx.save();
    ctx.translate(10, -20);
    ctx.rotate(-0.3);
    ctx.fillRect(0, -3, 50, 6);
    ctx.restore();
  } else {
    ctx.fillStyle = '#555';
    ctx.save();
    ctx.translate(15, -25);
    ctx.rotate(Math.atan2(mouseY - (y - 25), mouseX - (x + 15)) * (facing < 0 ? -1 : 1));
    ctx.fillRect(0, -3, 55, 6);
    // Barrel
    ctx.fillStyle = '#333';
    ctx.fillRect(45, -4, 15, 8);
    ctx.restore();
  }

  ctx.restore();
}

function drawBirdBoss(x, y, dark, flash) {
  ctx.save();
  ctx.translate(x, y);

  if (flash > 0 && frame % 6 < 3) {
    ctx.globalAlpha = 0.5;
  }

  // Shadow underneath
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 30, 30, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  if (dark) {
    // Dark mode bird - larger, more menacing
    // Dark aura
    ctx.fillStyle = `rgba(100, 0, 150, ${0.3 + 0.1 * Math.sin(frame * 0.1)})`;
    ctx.beginPath();
    ctx.arc(0, 0, 55, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.fillStyle = '#1a0a2a';
    ctx.beginPath();
    ctx.ellipse(0, 0, 35, 28, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#2a0a3a';
    ctx.beginPath();
    let wingAngle = Math.sin(frame * 0.15) * 0.4;
    ctx.save();
    ctx.rotate(wingAngle);
    ctx.ellipse(-35, -5, 30, 12, -0.3, 0, Math.PI * 2);
    ctx.restore();
    ctx.save();
    ctx.rotate(-wingAngle);
    ctx.ellipse(35, -5, 30, 12, 0.3, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();

    // Head
    ctx.fillStyle = '#2a0a3a';
    ctx.beginPath();
    ctx.arc(0, -22, 18, 0, Math.PI * 2);
    ctx.fill();

    // Red eyes
    ctx.fillStyle = '#ff0000';
    ctx.beginPath();
    ctx.arc(-7, -25, 5, 0, Math.PI * 2);
    ctx.arc(7, -25, 5, 0, Math.PI * 2);
    ctx.fill();
    // Glowing eyes
    ctx.fillStyle = `rgba(255, 0, 0, ${0.5 + 0.3 * Math.sin(frame * 0.1)})`;
    ctx.beginPath();
    ctx.arc(-7, -25, 8, 0, Math.PI * 2);
    ctx.arc(7, -25, 8, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#ff4400';
    ctx.beginPath();
    ctx.moveTo(0, -30);
    ctx.lineTo(-8, -20);
    ctx.lineTo(8, -20);
    ctx.closePath();
    ctx.fill();

    // Dark particles
    for (let i = 0; i < 3; i++) {
      let px = Math.sin(frame * 0.05 + i * 2) * 40;
      let py = Math.cos(frame * 0.07 + i * 3) * 30;
      ctx.fillStyle = `rgba(150, 0, 255, ${0.4 + 0.3 * Math.sin(frame * 0.1 + i)})`;
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  } else {
    // Normal bird
    // Body
    ctx.fillStyle = '#4488cc';
    ctx.beginPath();
    ctx.ellipse(0, 0, 28, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // Belly
    ctx.fillStyle = '#88bbee';
    ctx.beginPath();
    ctx.ellipse(0, 5, 18, 15, 0, 0, Math.PI * 2);
    ctx.fill();

    // Wings
    ctx.fillStyle = '#3366aa';
    let wingFlap = Math.sin(frame * 0.12) * 0.5;
    ctx.beginPath();
    ctx.save();
    ctx.rotate(wingFlap);
    ctx.ellipse(-25, -5, 22, 10, -0.3, 0, Math.PI * 2);
    ctx.restore();
    ctx.save();
    ctx.rotate(-wingFlap);
    ctx.ellipse(25, -5, 22, 10, 0.3, 0, Math.PI * 2);
    ctx.restore();
    ctx.fill();

    // Head
    ctx.fillStyle = '#5599dd';
    ctx.beginPath();
    ctx.arc(0, -18, 14, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(-5, -20, 3, 0, Math.PI * 2);
    ctx.arc(5, -20, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-4, -21, 1.5, 0, Math.PI * 2);
    ctx.arc(6, -21, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Beak
    ctx.fillStyle = '#ff8800';
    ctx.beginPath();
    ctx.moveTo(0, -24);
    ctx.lineTo(-6, -16);
    ctx.lineTo(6, -16);
    ctx.closePath();
    ctx.fill();

    // Tail
    ctx.fillStyle = '#3366aa';
    ctx.beginPath();
    ctx.moveTo(-8, 18);
    ctx.lineTo(-15, 35);
    ctx.lineTo(0, 25);
    ctx.lineTo(15, 35);
    ctx.lineTo(8, 18);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

function drawEgg(x, y, cracked) {
  ctx.save();
  ctx.translate(x, y);

  // Egg shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(0, 20, 18, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Egg body
  ctx.fillStyle = '#f5f0e0';
  ctx.beginPath();
  ctx.moveTo(0, -25);
  ctx.bezierCurveTo(18, -25, 20, 0, 18, 15);
  ctx.bezierCurveTo(15, 25, -15, 25, -18, 15);
  ctx.bezierCurveTo(-20, 0, -18, -25, 0, -25);
  ctx.fill();

  // Spots
  ctx.fillStyle = '#c4a875';
  [[5, -5, 4], [-8, 0, 3], [3, 10, 3], [-5, -15, 2.5], [10, 5, 2]].forEach(([sx, sy, sr]) => {
    ctx.beginPath();
    ctx.arc(sx, sy, sr, 0, Math.PI * 2);
    ctx.fill();
  });

  // Crack
  if (cracked > 0) {
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-5, -5);
    ctx.lineTo(0, 0);
    ctx.lineTo(5, -2);
    ctx.lineTo(3, 5);
    ctx.lineTo(8, 8);
    ctx.stroke();

    if (cracked > 1) {
      ctx.beginPath();
      ctx.moveTo(-8, 2);
      ctx.lineTo(-3, 5);
      ctx.lineTo(-6, 10);
      ctx.stroke();
    }
    if (cracked > 2) {
      // Light from crack
      ctx.fillStyle = `rgba(255, 255, 100, ${0.3 + 0.2 * Math.sin(frame * 0.1)})`;
      ctx.beginPath();
      ctx.arc(0, 0, 15, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawBullet(x, y, angle) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  // Tracer
  ctx.fillStyle = '#ffff00';
  ctx.fillRect(-2, -1, 8, 2);
  ctx.fillStyle = '#ff8800';
  ctx.fillRect(-6, -0.5, 4, 1);
  ctx.restore();
}

function drawMuzzleFlash(x, y) {
  ctx.save();
  ctx.translate(x, y);
  let a = 0.8;
  ctx.globalAlpha = a;
  ctx.fillStyle = '#ffff00';
  ctx.beginPath();
  ctx.arc(0, 0, 15, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#ff8800';
  ctx.beginPath();
  ctx.arc(0, 0, 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCrosshair(x, y) {
  ctx.strokeStyle = '#ff0000';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 15, 0, Math.PI * 2);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(x - 20, y); ctx.lineTo(x - 8, y);
  ctx.moveTo(x + 8, y); ctx.lineTo(x + 20, y);
  ctx.moveTo(x, y - 20); ctx.lineTo(x, y - 8);
  ctx.moveTo(x, y + 8); ctx.lineTo(x, y + 20);
  ctx.stroke();
}

function drawHPBar(x, y, w, h, hp, maxHp, color) {
  ctx.fillStyle = '#333';
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = color;
  ctx.fillRect(x + 1, y + 1, (w - 2) * (hp / maxHp), h - 2);
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);
}

function drawText(text, x, y, size, color, align) {
  ctx.fillStyle = color || '#fff';
  ctx.font = `${size || 24}px 'Microsoft YaHei', sans-serif`;
  ctx.textAlign = align || 'center';
  ctx.fillText(text, x, y);
}

// ============================================================
//  PARTICLES
// ============================================================
function spawnParticles(x, y, color, count, speed) {
  for (let i = 0; i < count; i++) {
    let angle = Math.random() * Math.PI * 2;
    let spd = Math.random() * speed + 1;
    particles.push({
      x, y, vx: Math.cos(angle) * spd, vy: Math.sin(angle) * spd - 1,
      life: 30 + Math.random() * 30, maxLife: 60, color, size: 2 + Math.random() * 3
    });
  }
}

function spawnFeathers(x, y, dark) {
  for (let i = 0; i < 5; i++) {
    feathers.push({
      x, y, vx: (Math.random() - 0.5) * 3, vy: -Math.random() * 2 - 1,
      rot: Math.random() * Math.PI * 2, rotSpeed: (Math.random() - 0.5) * 0.2,
      life: 60 + Math.random() * 40, color: dark ? '#2a0a3a' : '#5599dd'
    });
  }
}

function updateParticles() {
  particles = particles.filter(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.05; p.life--;
    if (p.life > 0) {
      ctx.globalAlpha = p.life / p.maxLife;
      ctx.fillStyle = p.color;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.globalAlpha = 1;
    }
    return p.life > 0;
  });

  feathers = feathers.filter(f => {
    f.x += f.vx; f.y += f.vy; f.vy += 0.03; f.vx *= 0.99;
    f.rot += f.rotSpeed; f.life--;
    if (f.life > 0) {
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.rotate(f.rot);
      ctx.globalAlpha = f.life / 100;
      ctx.fillStyle = f.color;
      ctx.beginPath();
      ctx.ellipse(0, 0, 8, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.globalAlpha = 1;
    }
    return f.life > 0;
  });
}

// ============================================================
//  SHOOTING
// ============================================================
let muzzleFlashTimer = 0;

function shoot() {
  if (hunter.reloading) return;

  let gunX = hunter.x + hunter.facing * 50;
  let gunY = hunter.y - 25;
  let angle = Math.atan2(mouseY - gunY, mouseX - gunX);

  bullets.push({
    x: gunX, y: gunY,
    vx: Math.cos(angle) * 18, vy: Math.sin(angle) * 18,
    life: 40
  });

  // Shotgun spread - extra pellets
  for (let i = -2; i <= 2; i++) {
    if (i === 0) continue;
    let spread = angle + i * 0.08;
    bullets.push({
      x: gunX, y: gunY,
      vx: Math.cos(spread) * 16, vy: Math.sin(spread) * 16,
      life: 30
    });
  }

  muzzleFlashTimer = 5;
  screenShake = 5;
  hunter.reloading = true;
  hunter.reloadTimer = 25;

  spawnParticles(gunX, gunY, '#ff8800', 8, 3);
}

// ============================================================
//  CUTSCENE SYSTEM
// ============================================================
let cutsceneQueue = [];
let currentCutscene = null;
let cutsceneCallback = null;

function playCutscene(scenes, callback) {
  cutsceneQueue = [...scenes];
  cutsceneCallback = callback;
  nextCutscene();
}

function nextCutscene() {
  if (cutsceneQueue.length === 0) {
    if (cutsceneCallback) cutsceneCallback();
    return;
  }
  currentCutscene = cutsceneQueue.shift();
  cutsceneTimer = currentCutscene.duration || 180;
  cutsceneText = currentCutscene.text || '';
  cutsceneTextTimer = 0;
}

function drawCutsceneOverlay() {
  if (!currentCutscene) return;

  // Cinematic bars
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, 80);
  ctx.fillRect(0, H - 80, W, 80);

  // Text
  if (cutsceneText) {
    cutsceneTextTimer++;
    let chars = Math.floor(cutsceneTextTimer / 2);
    let displayText = cutsceneText.substring(0, chars);

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(W / 2 - 350, H - 70, 700, 50);
    drawText(displayText, W / 2, H - 40, 22, '#fff');
  }

  // 空格跳过提示
  drawText('按 空格键 跳过 ▶', W / 2, 30, 16, 'rgba(255,255,255,0.6)');
}

// -- INTRO HUNTING SCENE --
let huntingScene = {
  hunterX: 100, walkTimer: 0, foundEgg: false, eggX: 650, eggY: 520
};

function updateHunting() {
  huntingScene.walkTimer++;
  if (huntingScene.walkTimer < 280) {
    // 猎人走向鸟蛋
    huntingScene.hunterX = 100 + (huntingScene.walkTimer / 280) * 500;
  } else if (!huntingScene.foundEgg) {
    huntingScene.foundEgg = true;
    playCutscene([
      { text: '这是什么？一枚巨大的鸟蛋！', duration: 150 },
      { text: '从没见过这么大的蛋……带回家研究一下。', duration: 180 }
    ], () => {
      gameState = 'foundEgg';
      timer = 0;
    });
  }
}

function drawHunting() {
  drawSky(0.3);
  drawGround();

  // Forest
  drawTree(500, 200, false);
  drawTree(700, 220, false);
  drawTree(900, 240, false);
  drawTree(350, 230, false);

  // 小鸟飞过的装饰动画
  if (huntingScene.walkTimer < 200) {
    let birdX = W - (huntingScene.walkTimer * 3) % (W + 100);
    let birdY = 150 + Math.sin(huntingScene.walkTimer * 0.05) * 20;
    ctx.fillStyle = '#5599dd';
    ctx.beginPath();
    ctx.moveTo(birdX, birdY);
    ctx.lineTo(birdX - 8, birdY - 5);
    ctx.lineTo(birdX - 16, birdY);
    ctx.stroke();
  }

  // Egg on ground - 闪光提示
  if (huntingScene.walkTimer > 180) {
    drawEgg(huntingScene.eggX, huntingScene.eggY, 0);
    // 闪光特效
    if (huntingScene.walkTimer < 280) {
      let glow = Math.sin(huntingScene.walkTimer * 0.1) * 0.3 + 0.5;
      ctx.fillStyle = `rgba(255, 255, 100, ${glow})`;
      ctx.beginPath();
      ctx.arc(huntingScene.eggX, huntingScene.eggY, 25, 0, Math.PI * 2);
      ctx.fill();
      drawText('?', huntingScene.eggX, huntingScene.eggY - 45, 30, '#ff0');
    }
  }

  // Hunter walking
  drawHunter(huntingScene.hunterX, 480, 1, false);

  // 文字提示
  if (huntingScene.walkTimer < 180) {
    drawText('在森林深处打猎中...', W / 2, 40, 28, '#fff');
  } else if (huntingScene.walkTimer < 300) {
    drawText('咦？那是什么？', W / 2, 40, 28, '#ffdd88');
  }

  // 空格跳过提示
  drawText('按 空格键 跳过剧情 ▶', W / 2, H - 20, 16, 'rgba(255,255,255,0.5)');

  drawCutsceneOverlay();
}

// -- FOUND EGG / GO HOME SCENE --
function drawFoundEgg() {
  timer++;

  drawSky(0.2);
  drawGround();

  // 远处的树
  drawTree(900, 200, false);
  drawTree(1050, 230, false);

  // 画房子作为目的地
  drawHouse();

  if (timer < 180) {
    // 猎人走向鸟蛋
    let pickupProgress = timer / 180;
    let hunterX = 600 + pickupProgress * 40;
    drawHunter(hunterX, 480, 1, false);
    drawEgg(650, 520, 0);
    drawText('小心翼翼地捡起鸟蛋...', W / 2, 40, 24, '#fff');
  } else if (timer < 240) {
    // 捡起鸟蛋的瞬间
    drawHunter(640, 480, 1, false);
    let liftProgress = (timer - 180) / 60;
    drawEgg(650, 520 - liftProgress * 60, 0);
    spawnParticles(650, 500, '#ffdd88', 2, 1);
    drawText('捡到了！好大的蛋...', W / 2, 40, 24, '#fff');
  } else if (timer < 500) {
    // 走回家
    let walkProgress = (timer - 240) / 260;
    let hunterX = 640 - walkProgress * 440;
    drawHunter(hunterX, 480, -1, false);
    // 手中的蛋
    ctx.save();
    ctx.translate(hunterX + 5, 440);
    ctx.fillStyle = '#f5f0e0';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 13, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // 走到一半时显示文字
    if (walkProgress < 0.5) {
      drawText('带着鸟蛋回家...', W / 2, 40, 24, '#fff');
    } else {
      drawText('快到家了！', W / 2, 40, 24, '#88ff88');
    }
  } else {
    gameState = 'hatchScene';
    timer = 0;
  }

  // 空格跳过提示
  drawText('按 空格键 跳过剧情 ▶', W / 2, H - 20, 16, 'rgba(255,255,255,0.5)');
}

// -- HATCH SCENE --
function drawHatchScene() {
  timer++;

  drawSky(0.15);
  drawGround();
  drawHouse();

  // 远处的树
  drawTree(900, 200, false);
  drawTree(1050, 230, false);

  // Egg inside house area (outside by door)
  let eggX = 250, eggY = 520;

  if (timer < 120) {
    // Place egg
    drawHunter(230, 480, 1, false);
    drawEgg(eggX, eggY, 0);
    drawText('把鸟蛋放在了门前...', W / 2, 40, 24, '#fff');
  } else if (timer < 300) {
    // Egg starts shaking
    let shake = Math.sin(timer * 0.3) * 3;
    drawHunter(150, 480, 1, false);
    eggBounce = Math.sin(timer * 0.2) * 5;
    drawEgg(eggX + shake, eggY + eggBounce, Math.floor((timer - 120) / 60));
    if (timer > 200) {
      drawText('鸟蛋开始剧烈晃动！', W / 2, 40, 28, '#ff0');
    }
  } else if (timer < 420) {
    // Egg hatches!
    eggCrack = 3;
    let hatchProgress = (timer - 300) / 120;
    drawEgg(eggX, eggY, 3);

    // Light beam from egg
    ctx.fillStyle = `rgba(255, 255, 100, ${0.5 * (1 - hatchProgress)})`;
    ctx.beginPath();
    ctx.moveTo(eggX - 20, eggY);
    ctx.lineTo(eggX - 60, eggY - 200);
    ctx.lineTo(eggX + 60, eggY - 200);
    ctx.lineTo(eggX + 20, eggY);
    ctx.closePath();
    ctx.fill();

    // Bird emerging
    if (hatchProgress > 0.3) {
      let birdY = eggY - 20 - (hatchProgress - 0.3) * 80;
      drawBirdBoss(eggX, birdY, false, 0);
    }

    spawnParticles(eggX, eggY - 20, '#ffff88', 3, 2);

    drawHunter(150, 480, 1, false);
    drawText('鸟蛋孵化了！一只巨大的鸟从蛋中跳出！', W / 2, 40, 26, '#ff8800');
  } else if (timer < 520) {
    // Bird looks at hunter, then flies to trees
    let flyProgress = (timer - 420) / 100;
    let birdX = 250 + flyProgress * 500;
    let birdY = 480 - flyProgress * 200;
    drawBirdBoss(birdX, birdY, false, 0);
    drawHunter(150, 480, 1, false);
    drawEgg(eggX, eggY, 3);

    if (flyProgress > 0.5) {
      drawText('它飞到了树上，似乎要发起攻击！', W / 2, 40, 26, '#f44');
    }
  } else {
    // Transition to boss fight
    gameState = 'bossFight';
    timer = 0;
    bird.x = 600;
    bird.y = 200;
    bird.hp = bird.maxHp;
    bird.phase = 'treeJump';
    bird.jumpTimer = 0;
    bird.targetTree = 0;
    bird.darkMode = false;
    hunter.hp = hunter.maxHp;
    hunter.x = 200;
  }

  // 空格跳过提示
  drawText('按 空格键 跳过剧情 ▶', W / 2, H - 20, 16, 'rgba(255,255,255,0.5)');
}

// -- BOSS FIGHT --
let bossFightStarted = false;

function updateBossFight() {
  timer++;

  // Hunter movement
  if (keys['a'] || keys['arrowleft']) {
    hunter.x -= 5;
    hunter.facing = -1;
  }
  if (keys['d'] || keys['arrowright']) {
    hunter.x += 5;
    hunter.facing = 1;
  }
  hunter.x = Math.max(30, Math.min(W - 30, hunter.x));

  // Reload
  if (hunter.reloading) {
    hunter.reloadTimer--;
    if (hunter.reloadTimer <= 0) hunter.reloading = false;
  }

  // Invincibility frames
  if (hunter.invincible > 0) hunter.invincible--;

  // Bird AI
  if (!bird.darkMode) {
    // Phase 1: Tree jumping
    bird.jumpTimer++;

    let targetTreePos = trees[bird.targetTree];
    let dx = targetTreePos.x - bird.x;
    let dy = targetTreePos.y - bird.y;
    let dist = Math.sqrt(dx * dx + dy * dy);

    if (dist > 5) {
      bird.x += (dx / dist) * 6;
      bird.y += (dy / dist) * 6 + Math.sin(frame * 0.08) * 2;
    } else {
      // Reached tree, wait then jump to next
      if (bird.jumpTimer > 60) {
        bird.targetTree = (bird.targetTree + 1) % trees.length;
        bird.jumpTimer = 0;
      }
    }

    // Bird occasionally swoops at player
    if (timer > 180 && timer % 240 < 30) {
      let swoopDx = hunter.x - bird.x;
      let swoopDy = (hunter.y - 30) - bird.y;
      let swoopDist = Math.sqrt(swoopDx * swoopDx + swoopDy * swoopDy);
      bird.x += (swoopDx / swoopDist) * 10;
      bird.y += (swoopDy / swoopDist) * 10;

      // Hit detection
      if (swoopDist < 40 && hunter.invincible <= 0) {
        hunter.hp -= 10;
        hunter.invincible = 30;
        screenShake = 8;
        spawnParticles(hunter.x, hunter.y - 20, '#ff0000', 5, 3);
      }
    }

    // Check if HP drops below 50% - enter dark mode
    if (bird.hp <= bird.maxHp * 0.5 && !bird.darkMode) {
      bird.darkMode = true;
      bird.darkTimer = 0;
      gameState = 'darkMode';
      screenShake = 15;
      // Dark transformation effect
      for (let i = 0; i < 50; i++) {
        spawnParticles(bird.x, bird.y, '#8800ff', 3, 5);
      }
    }
  }

  // Update bullets
  bullets = bullets.filter(b => {
    b.x += b.vx; b.y += b.vy; b.life--;
    if (b.life <= 0) return false;

    // Hit bird
    let dx = b.x - bird.x;
    let dy = b.y - bird.y;
    if (Math.sqrt(dx * dx + dy * dy) < 35) {
      bird.hp -= 5;
      bird.flashTimer = 10;
      spawnParticles(b.x, b.y, bird.darkMode ? '#8800ff' : '#5599dd', 5, 3);
      spawnFeathers(bird.x, bird.y, bird.darkMode);
      screenShake = 3;
      return false;
    }

    // Draw
    drawBullet(b.x, b.y, Math.atan2(b.vy, b.vx));
    return b.x > 0 && b.x < W && b.y > 0 && b.y < H;
  });

  // Muzzle flash
  if (muzzleFlashTimer > 0) {
    muzzleFlashTimer--;
    drawMuzzleFlash(hunter.x + hunter.facing * 55, hunter.y - 25);
  }

  // Bird flash
  if (bird.flashTimer > 0) bird.flashTimer--;

  // Check bird death
  if (bird.hp <= 0) {
    gameState = 'victory';
    timer = 0;
    for (let i = 0; i < 100; i++) {
      spawnParticles(bird.x, bird.y, bird.darkMode ? '#8800ff' : '#5599dd', 3, 5);
    }
  }

  // Check hunter death
  if (hunter.hp <= 0) {
    gameState = 'death';
    document.getElementById('death-screen').style.display = 'flex';
  }
}

function updateDarkMode() {
  bird.darkTimer++;

  // Dark mode transformation sequence
  if (bird.darkTimer < 120) {
    // Transformation animation
    screenShake = Math.sin(bird.darkTimer * 0.1) * 5;
    spawnParticles(bird.x, bird.y, '#8800ff', 2, 3);
    spawnParticles(bird.x, bird.y, '#ff0000', 1, 2);
  } else {
    // Dark mode active - bird attacks aggressively
    gameState = 'bossFight';

    // Peck attack pattern
    bird.jumpTimer++;

    if (!bird.pecking) {
      // Move to attack position
      let targetX = hunter.x + (Math.random() - 0.5) * 200;
      let targetY = 180 + Math.random() * 100;
      let dx = targetX - bird.x;
      let dy = targetY - bird.y;
      let dist = Math.sqrt(dx * dx + dy * dy);

      if (dist > 10) {
        bird.x += (dx / dist) * 8;
        bird.y += (dy / dist) * 8;
      } else if (bird.jumpTimer > 40) {
        // Start peck attack
        bird.pecking = true;
        bird.peckX = hunter.x;
        bird.peckY = hunter.y - 30;
        bird.peckTimer = 0;
        bird.jumpTimer = 0;
      }
    } else {
      // Pecking attack
      bird.peckTimer++;
      let peckProgress = bird.peckTimer / 30;

      if (peckProgress < 0.5) {
        // Wind up
        bird.x += (bird.peckX - bird.x) * 0.1;
        bird.y += (bird.peckY - 50 - bird.y) * 0.1;
      } else if (peckProgress < 0.8) {
        // Strike down
        let strikeProgress = (peckProgress - 0.5) / 0.3;
        bird.y += (bird.peckY - bird.y) * 0.3;

        // Hit detection during strike
        let dx = bird.x - hunter.x;
        let dy = bird.y - (hunter.y - 20);
        if (Math.sqrt(dx * dx + dy * dy) < 50 && hunter.invincible <= 0) {
          hunter.hp -= 15;
          hunter.invincible = 45;
          screenShake = 12;
          spawnParticles(hunter.x, hunter.y - 20, '#ff0000', 8, 4);
        }
      } else {
        // Retreat
        bird.y -= 5;
        if (bird.peckTimer > 50) {
          bird.pecking = false;
          bird.peckTimer = 0;
        }
      }
    }

    // Random dark projectiles
    if (bird.darkTimer % 60 === 0 && bird.darkTimer > 120) {
      // Spawn dark energy ball
      let angle = Math.atan2(hunter.y - 20 - bird.y, hunter.x - bird.x);
      bullets.push({
        x: bird.x, y: bird.y,
        vx: Math.cos(angle) * 6, vy: Math.sin(angle) * 6,
        life: 80, dark: true
      });
    }

    // Continue normal bullet update
    updateBossFight();
  }
}

// ============================================================
//  MAIN DRAW
// ============================================================
function drawBossFight() {
  let nightAmount = bird.darkMode ? 0.8 : 0.4;
  drawSky(nightAmount);
  drawGround();

  // Draw trees
  trees.forEach((t, i) => drawTree(t.x, t.y, bird.darkMode));

  // Draw house in background
  if (!bird.darkMode) drawHouse();

  // Draw bird
  if (bird.flashTimer > 0) {
    ctx.globalAlpha = 0.7;
  }
  drawBirdBoss(bird.x, bird.y, bird.darkMode, bird.flashTimer);
  ctx.globalAlpha = 1;

  // Draw hunter
  if (hunter.invincible > 0 && frame % 4 < 2) {
    ctx.globalAlpha = 0.5;
  }
  drawHunter(hunter.x, hunter.y, hunter.facing, hunter.reloading);
  ctx.globalAlpha = 1;

  // Dark projectiles
  bullets.forEach(b => {
    if (b.dark) {
      ctx.fillStyle = '#8800ff';
      ctx.beginPath();
      ctx.arc(b.x, b.y, 8, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = `rgba(136, 0, 255, ${0.3 + 0.2 * Math.sin(frame * 0.1)})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, 14, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Particles
  updateParticles();

  // Crosshair
  drawCrosshair(mouseX, mouseY);

  // HUD
  // Hunter HP
  drawHPBar(20, 20, 200, 20, hunter.hp, hunter.maxHp, '#4a4');
  drawText(`猎人 HP: ${hunter.hp}`, 120, 55, 16, '#fff');

  // Bird HP
  drawHPBar(W - 220, 20, 200, 20, bird.hp, bird.maxHp, bird.darkMode ? '#a0a' : '#44a');
  drawText(`猛禽 HP: ${Math.max(0, bird.hp)}`, W - 120, 55, 16, bird.darkMode ? '#f0f' : '#88f');

  // Reload indicator
  if (hunter.reloading) {
    let reloadProgress = 1 - (hunter.reloadTimer / 25);
    ctx.fillStyle = '#ff8800';
    ctx.fillRect(hunter.x - 20, hunter.y + 45, 40 * reloadProgress, 5);
    drawText('装弹中...', hunter.x, hunter.y + 65, 14, '#ff8800');
  }

  // Dark mode warning
  if (bird.darkMode) {
    let alpha = 0.3 + 0.2 * Math.sin(frame * 0.05);
    ctx.fillStyle = `rgba(100, 0, 150, ${alpha})`;
    ctx.fillRect(0, 0, W, H);

    drawText('⚠ 黑化模式 - 猛禽攻击力增强！', W / 2, 80, 22, '#ff00ff');
  }

  // Controls hint
  if (gameState === 'darkMode') {
    drawText('按 空格键 跳过黑化动画 ▶', W / 2, H - 20, 16, 'rgba(255,255,255,0.6)');
  } else {
    drawText('A/D 移动 | 鼠标瞄准 | 点击射击 | 空格跳过', W / 2, H - 20, 16, 'rgba(255,255,255,0.6)');
  }
}

// ============================================================
//  MAIN LOOP
// ============================================================
function gameLoop() {
  frame++;

  ctx.save();

  // Screen shake
  if (screenShake > 0) {
    ctx.translate(
      (Math.random() - 0.5) * screenShake * 2,
      (Math.random() - 0.5) * screenShake * 2
    );
    screenShake *= 0.9;
    if (screenShake < 0.5) screenShake = 0;
  }

  switch (gameState) {
    case 'intro':
    case 'hunting':
      updateHunting();
      drawHunting();
      break;
    case 'foundEgg':
      drawFoundEgg();
      break;
    case 'hatchScene':
      drawHatchScene();
      break;
    case 'bossFight':
      updateBossFight();
      drawBossFight();
      break;
    case 'darkMode':
      updateDarkMode();
      drawBossFight();
      break;
    case 'victory':
      drawVictory();
      break;
  }

  // Update cutscene
  if (currentCutscene) {
    cutsceneTimer--;
    if (cutsceneTimer <= 0) nextCutscene();
    drawCutsceneOverlay();
  }

  ctx.restore();

  requestAnimationFrame(gameLoop);
}

// ============================================================
//  GAME START / RESET
// ============================================================
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  gameState = 'hunting';
  timer = 0;
  frame = 0;
  huntingScene = { hunterX: 100, walkTimer: 0, foundEgg: false, eggX: 650, eggY: 520 };
  hunter = { x: 200, y: 480, w: 50, h: 70, hp: 100, maxHp: 100, facing: 1, reloading: false, reloadTimer: 0, invincible: 0 };
  bird = { x: 800, y: 300, w: 60, h: 50, hp: 150, maxHp: 150, phase: 'treeJump', targetTree: 0, jumpTimer: 0, darkMode: false, darkTimer: 0, peckX: 0, peckY: 0, pecking: false, peckTimer: 0, flashTimer: 0, velocityY: 0, onGround: false };
  bullets = [];
  particles = [];
  feathers = [];
  screenShake = 0;
  eggCrack = 0;
  eggBounce = 0;
  cutsceneQueue = [];
  currentCutscene = null;
  cutsceneCallback = null;
}

function resetGame() {
  startGame();
  document.getElementById('start-screen').style.display = 'none';
}

// Start the loop
gameLoop();
</script>
